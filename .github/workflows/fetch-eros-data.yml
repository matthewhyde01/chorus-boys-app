name: Fetch Eros Data

on:
  workflow_dispatch:

# Triggered via workflow_dispatch only, fired by the Chorus Boys Sync
# iOS Shortcut (manual Home Screen button) — no cron-job.org schedule.

concurrency:
  group: chorus-boys-app-main-push
  cancel-in-progress: false

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Query trials + extract reflection
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          python - <<'EOF'
          import requests, json, os
          from datetime import datetime

          notion_key = os.environ["NOTION_API_KEY"].strip()
          if not notion_key:
              raise ValueError("Secret NOTION_API_KEY is not set")

          notion_headers = {
              "Authorization": f"Bearer {notion_key}",
              "Notion-Version": "2022-06-28",
          }

          SERVICE_COMPENDIUM_DB_ID = "1345c915-686b-4efd-939c-363c53c5315d"

          os.makedirs("data", exist_ok=True)

          # ── Step 2: Query Service Compendium, filtered God = Eros ─────────────
          print("Querying Service Compendium for Eros trials...")
          trials_data = []
          grace_total = 0
          cursor = None
          while True:
              body = {
                  "filter": {"property": "God", "select": {"equals": "Eros"}},
                  "page_size": 100,
              }
              if cursor:
                  body["start_cursor"] = cursor
              r = requests.post(
                  f"https://api.notion.com/v1/databases/{SERVICE_COMPENDIUM_DB_ID}/query",
                  headers={**notion_headers, "Content-Type": "application/json"},
                  json=body,
              )
              if not r.ok:
                  print(f"Service Compendium query failed: {r.status_code} {r.text[:200]}")
                  break
              result = r.json()
              for page in result.get("results", []):
                  props = page.get("properties", {})
                  def get_select(key):
                      s = props.get(key, {}).get("select")
                      return s.get("name") if s else None
                  def get_title(key):
                      t = props.get(key, {}).get("title", [])
                      return "".join(x.get("plain_text", "") for x in t)
                  def get_rich_text(key):
                      t = props.get(key, {}).get("rich_text", [])
                      return "".join(x.get("plain_text", "") for x in t)
                  def get_date(key):
                      d = props.get(key, {}).get("date")
                      return d.get("start") if d else None
                  def get_number(key):
                      return props.get(key, {}).get("number")
                  status = get_select("Status")
                  if status == "Retired":
                      continue
                  grace = get_number("Grace Earned") or 0
                  if status == "Complete":
                      grace_total += grace
                      continue
                  trials_data.append({
                      "service": get_title("Service"),
                      "tier": get_select("Tier"),
                      "mystery": get_select("Mystery"),
                      "status": status,
                      "due_date": get_date("Due Date"),
                      "trigger_condition": get_rich_text("Trigger Condition"),
                      "description": get_rich_text("Description"),
                      "favour_value": get_number("Favour Value"),
                      "grace_earned": grace,
                  })
              if not result.get("has_more"):
                  break
              cursor = result.get("next_cursor")

          with open("data/eros_trials.json", "w") as f:
              json.dump({
                  "updated_at": datetime.utcnow().isoformat() + "Z",
                  "trials": trials_data,
                  "grace_total": grace_total,
              }, f, indent=2)
          print(f"Trials written: {len(trials_data)} active/planned, {grace_total} Grace earned")

          # ── Step 3: Pull most recent Check-In entry from Eros Check-Ins database ──
          print("Querying Eros Check-Ins for most recent entry...")

          EROS_CHECKINS_DB_ID = "74e2c76ef4dd41faa56fd7eb8f3789d8"

          r = requests.post(
              f"https://api.notion.com/v1/databases/{EROS_CHECKINS_DB_ID}/query",
              headers={**notion_headers, "Content-Type": "application/json"},
              json={
                  "sorts": [{"property": "Date", "direction": "descending"}],
                  "page_size": 1,
              },
          )
          r.raise_for_status()
          results = r.json().get("results", [])

          def get_rich_text(props, key):
              t = props.get(key, {}).get("rich_text", [])
              return "".join(x.get("plain_text", "") for x in t)

          def get_date(props, key):
              d = props.get(key, {}).get("date")
              return d.get("start") if d else None

          def get_select(props, key):
              s = props.get(key, {}).get("select")
              return s.get("name") if s else None

          if results:
              props = results[0]["properties"]
              sexual = get_rich_text(props, "Dante: Sexual Challenges Read")
              kink = get_rich_text(props, "Dante: Kink Exploration Read")
              vuln = get_rich_text(props, "Dante: Vulnerability Read")
              trial = get_rich_text(props, "Trial Assigned")

              # Same shape as before ({"entry": "..."}) so the frontend doesn't need
              # to change — just assembling it from real data instead of an LLM guess.
              entry_parts = []
              if sexual:
                  entry_parts.append(f"Sexual Challenges: {sexual}")
              if kink:
                  entry_parts.append(f"Kink Exploration: {kink}")
              if vuln:
                  entry_parts.append(f"Vulnerability: {vuln}")
              if trial:
                  entry_parts.append(f"Trial Assigned: {trial}")
              reflection_entry = "\n\n".join(entry_parts) if entry_parts else "No entry recorded yet."
          else:
              reflection_entry = "No Check-In entries found."

          with open("data/eros_reflection.json", "w") as f:
              json.dump({"updated_at": datetime.utcnow().isoformat() + "Z", "entry": reflection_entry}, f, indent=2)
          print(f"Reflection entry written from Check-Ins database ({len(reflection_entry)} chars)")
          EOF

      - name: Commit data files
        run: |
          git config user.name "Dante"
          git config user.email "dante@chorus-boys"
          git add data/eros_trials.json data/eros_reflection.json
          git diff --staged --quiet || git commit -m "chore: update eros data [$(date -u '+%Y-%m-%d %H:%M')] UTC"

      - name: Push with retry
        run: |
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main && break
            sleep $((RANDOM % 10 + 5))
          done
