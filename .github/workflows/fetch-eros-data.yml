name: Fetch Eros Data

on:
  workflow_dispatch:

# Triggered via workflow_dispatch only. Two sources:
# 1. cron-job.org — scheduled externally by Matt
# 2. Manual trigger via GitHub Actions UI
# No internal GitHub cron schedule — all scheduling handled externally.

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Eros voice from Notion + query trials + extract reflection
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python - <<'EOF'
          import requests, json, os
          from datetime import datetime

          notion_key = os.environ["NOTION_API_KEY"].strip()
          anthropic_key = os.environ["ANTHROPIC_API_KEY"].strip()
          if not notion_key:
              raise ValueError("Secret NOTION_API_KEY is not set")
          if not anthropic_key:
              raise ValueError("Secret ANTHROPIC_API_KEY is not set")

          notion_headers = {
              "Authorization": f"Bearer {notion_key}",
              "Notion-Version": "2022-06-28",
          }

          EROS_PAGE_ID = "379db4862bcd810c9243fb0723538ac4"
          SERVICE_COMPENDIUM_DB_ID = "dc3f975b-7f4d-4361-b859-079936ccdd10"
          TEXT_TYPES = {"paragraph", "heading_1", "heading_2", "heading_3",
                        "bulleted_list_item", "numbered_list_item", "quote", "callout", "toggle"}

          def extract_block_text(block):
              bt = block.get("type", "")
              if bt in TEXT_TYPES:
                  rt = block.get(bt, {}).get("rich_text", [])
                  return " ".join(t.get("plain_text", "") for t in rt)
              return ""

          def fetch_blocks(block_id, depth=0):
              url = f"https://api.notion.com/v1/blocks/{block_id}/children?page_size=100"
              r = requests.get(url, headers=notion_headers)
              if not r.ok:
                  print(f"Notion fetch failed for {block_id}: {r.status_code}")
                  return []
              results = []
              for block in r.json().get("results", []):
                  text = extract_block_text(block)
                  children = []
                  if block.get("has_children") and depth < 2:
                      children = fetch_blocks(block["id"], depth + 1)
                  results.append({"id": block["id"], "type": block.get("type", ""), "text": text, "children": children})
              return results

          def flatten_blocks(blocks, indent=0):
              lines = []
              prefix = "  " * indent
              for b in blocks:
                  if b["text"]:
                      lines.append(prefix + b["text"])
                  if b.get("children"):
                      lines.extend(flatten_blocks(b["children"], indent + 1))
              return lines

          # ── Step 1: Fetch Eros voice/context ──────────────────────────────────
          print("Fetching Eros Notion page...")
          blocks = fetch_blocks(EROS_PAGE_ID)
          full_text = "\n".join(flatten_blocks(blocks))

          os.makedirs("data", exist_ok=True)
          with open("data/eros_voice.json", "w") as f:
              json.dump({"voice_brief": full_text}, f, indent=2)
          print(f"Notion: Eros voice written ({len(full_text)} chars)")

          # ── Claude helper ─────────────────────────────────────────────────────
          def claude_call(system, user, model="claude-haiku-4-5-20251001", max_tokens=800):
              r = requests.post(
                  "https://api.anthropic.com/v1/messages",
                  headers={
                      "x-api-key": anthropic_key,
                      "anthropic-version": "2023-06-01",
                      "content-type": "application/json",
                  },
                  json={
                      "model": model,
                      "max_tokens": max_tokens,
                      "system": system,
                      "messages": [{"role": "user", "content": user}],
                  },
                  timeout=45,
              )
              r.raise_for_status()
              return r.json()["content"][0]["text"].strip()

          # ── Step 2: Query Service Compendium, filtered God = Eros ─────────────
          print("Querying Service Compendium for Eros trials...")
          trials_data = []
          grace_total = 0
          cursor = None
          while True:
              body = {
                  "filter": {"property": "God", "select": {"equals": "Eros"}},
                  "page_size": 100,
              }
              if cursor:
                  body["start_cursor"] = cursor
              r = requests.post(
                  f"https://api.notion.com/v1/databases/{SERVICE_COMPENDIUM_DB_ID}/query",
                  headers={**notion_headers, "Content-Type": "application/json"},
                  json=body,
              )
              print(f"DEBUG Notion status: {r.status_code}")
              print(f"DEBUG Notion body: {r.text[:500]}")
              if not r.ok:
                  print(f"Service Compendium query failed: {r.status_code} {r.text[:200]}")
                  break
              result = r.json()
              for page in result.get("results", []):
                  props = page.get("properties", {})
                  def get_select(key):
                      s = props.get(key, {}).get("select")
                      return s.get("name") if s else None
                  def get_title(key):
                      t = props.get(key, {}).get("title", [])
                      return "".join(x.get("plain_text", "") for x in t)
                  def get_rich_text(key):
                      t = props.get(key, {}).get("rich_text", [])
                      return "".join(x.get("plain_text", "") for x in t)
                  def get_date(key):
                      d = props.get(key, {}).get("date")
                      return d.get("start") if d else None
                  def get_number(key):
                      return props.get(key, {}).get("number")
                  status = get_select("Status")
                  if status == "Retired":
                      continue
                  grace = get_number("Grace Earned") or 0
                  if status == "Complete":
                      grace_total += grace
                      continue
                  trials_data.append({
                      "service": get_title("Service"),
                      "tier": get_select("Tier"),
                      "mystery": get_select("Mystery"),
                      "status": status,
                      "due_date": get_date("Due Date"),
                      "trigger_condition": get_rich_text("Trigger Condition"),
                      "favour_value": get_number("Favour Value"),
                      "grace_earned": grace,
                  })
              if not result.get("has_more"):
                  break
              cursor = result.get("next_cursor")

          with open("data/eros_trials.json", "w") as f:
              json.dump({
                  "updated_at": datetime.utcnow().isoformat() + "Z",
                  "trials": trials_data,
                  "grace_total": grace_total,
              }, f, indent=2)
          print(f"Trials written: {len(trials_data)} active/planned, {grace_total} Grace earned")

          # ── Step 3: Extract most recent Reflection Log entry ──────────────────
          print("Extracting Reflection Log entry...")
          page_excerpt = full_text[:6000]
          reflection_entry = claude_call(
              "You are a precise text extractor. Your only job is to find and return text verbatim from the document provided. "
              "Do not summarise, paraphrase, interpret, or add any commentary. "
              "Do not include any preamble, explanation, or meta-commentary in your response. "
              "Return only the content requested — nothing else.",
              f"Find the most recent dated entry under the Reflection Log section of this Notion page. "
              f"Return its content as close to verbatim as possible — light formatting cleanup only "
              f"(strip markdown bold markers, keep paragraph breaks). "
              f"Do not summarise, paraphrase, or add commentary. "
              f"Do not include the date heading itself. "
              f"Return only the entry text.\n\nPage content:\n\n{page_excerpt}",
              model="claude-haiku-4-5-20251001",
              max_tokens=1500,
          )

          with open("data/eros_reflection.json", "w") as f:
              json.dump({"updated_at": datetime.utcnow().isoformat() + "Z", "entry": reflection_entry}, f, indent=2)
          print(f"Reflection entry written ({len(reflection_entry)} chars)")
          EOF

      - name: Commit data files
        run: |
          git config user.name "Dante"
          git config user.email "dante@chorus-boys"
          git add data/eros_voice.json data/eros_trials.json data/eros_reflection.json
          git diff --staged --quiet || git commit -m "chore: update eros data [$(date -u '+%Y-%m-%d %H:%M')] UTC"
          git pull --rebase
          git push
