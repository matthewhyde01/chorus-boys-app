name: Complete Devotion

on:
  workflow_dispatch:
    inputs:
      notion_service_id:
        description: 'Notion page ID of the Devotion (32-char hex, no dashes)'
        required: true
        type: string
      service_name:
        description: 'Devotion name (passed from devotions.html, used in commit message)'
        required: true
        type: string
      date_completed:
        description: 'Date completed (YYYY-MM-DD, Sydney local)'
        required: true
        type: string
      notes:
        description: 'Optional notes'
        required: false
        type: string

jobs:
  complete-devotion:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Write completion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_SERVICE_ID: ${{ inputs.notion_service_id }}
          DATE_COMPLETED: ${{ inputs.date_completed }}
          NOTES: ${{ inputs.notes }}
        run: |
          python - <<'EOF'
          import requests, json, os, sqlite3, re
          from datetime import datetime

          notion_key = os.environ["NOTION_API_KEY"].strip()
          page_id_compact = os.environ["NOTION_SERVICE_ID"].strip()
          date_completed  = os.environ["DATE_COMPLETED"].strip()
          notes           = os.environ.get("NOTES", "").strip() or None

          notion_headers = {
              "Authorization": f"Bearer {notion_key}",
              "Notion-Version": "2022-06-28",
              "content-type": "application/json",
          }

          # Format compact ID as UUID
          pid = page_id_compact
          if len(pid) == 32 and "-" not in pid:
              pid = f"{pid[:8]}-{pid[8:12]}-{pid[12:16]}-{pid[16:20]}-{pid[20:]}"

          # ── 1. Fetch Devotion metadata from Notion ───────────────────────────
          r = requests.get(
              f"https://api.notion.com/v1/pages/{pid}",
              headers=notion_headers,
              timeout=30,
          )
          if not r.ok:
              raise RuntimeError(f"Failed to fetch page {pid}: {r.status_code} {r.text[:300]}")
          page = r.json()

          def prop_text(name):
              p = page.get("properties", {}).get(name, {})
              pt = p.get("type", "")
              if pt == "title":     return " ".join(t.get("plain_text","") for t in p.get("title",[]))
              if pt == "rich_text": return " ".join(t.get("plain_text","") for t in p.get("rich_text",[]))
              if pt == "select":    return (p.get("select") or {}).get("name","")
              if pt == "date":      return (p.get("date") or {}).get("start","")
              if pt == "number":    return p.get("number")
              return ""

          service_name  = prop_text("Service") or prop_text("Name") or page_id_compact
          god           = prop_text("God")
          mystery       = (page.get("properties", {}).get("Mystery", {}).get("select") or {}).get("name", "")
          favour_value  = float(page.get("properties",{}).get("Favour Value",{}).get("number") or 0)
          frequency_cap = prop_text("Frequency Cap") or "1/day"

          # Devotions never earn Grace — only Trials do.
          grace_earned = 0.0

          m = re.match(r"\s*(\d+)\s*/\s*day", frequency_cap, re.IGNORECASE)
          cap_per_day = int(m.group(1)) if m else 1

          print(f"Devotion: {service_name} | {god} | mystery={mystery} | favour={favour_value} | cap={cap_per_day}/day")

          # ── 2. Write completion to SQLite (respecting Frequency Cap) ─────────
          os.makedirs("data", exist_ok=True)
          conn = sqlite3.connect("data/grace.db")
          conn.execute("""
              CREATE TABLE IF NOT EXISTS completion_log (
                  id INTEGER PRIMARY KEY AUTOINCREMENT,
                  service_name TEXT NOT NULL,
                  notion_service_id TEXT NOT NULL,
                  date_completed TEXT NOT NULL,
                  god TEXT NOT NULL,
                  tier TEXT NOT NULL,
                  favour_value REAL DEFAULT 0,
                  grace_earned REAL DEFAULT 0,
                  source TEXT NOT NULL,
                  notes TEXT,
                  mystery TEXT DEFAULT '',
                  created_at TEXT DEFAULT (datetime('now'))
              )
          """)
          conn.commit()
          try:
              conn.execute("ALTER TABLE completion_log ADD COLUMN mystery TEXT DEFAULT ''")
              conn.commit()
          except Exception:
              pass  # column already exists

          existing_today = conn.execute(
              "SELECT COUNT(*) FROM completion_log WHERE notion_service_id=? AND date_completed=?",
              (page_id_compact, date_completed),
          ).fetchone()[0]

          if existing_today >= cap_per_day:
              print(f"Frequency Cap reached ({existing_today}/{cap_per_day}) — skipping SQLite write")
          else:
              conn.execute(
                  "INSERT INTO completion_log (service_name, notion_service_id, date_completed, god, tier, favour_value, grace_earned, source, notes, mystery) VALUES (?,?,?,?,?,?,?,?,?,?)",
                  (service_name, page_id_compact, date_completed, god, "Devotion", favour_value, grace_earned, "Manual", notes, mystery),
              )
              conn.commit()
              print(f"SQLite: logged {service_name} on {date_completed}")

          # ── 3. Recalculate and export grace.json ─────────────────────────────
          CHALLENGES_DB = "1345c915-686b-4efd-939c-363c53c5315d"
          all_svc_r = requests.post(
              f"https://api.notion.com/v1/databases/{CHALLENGES_DB}/query",
              headers=notion_headers,
              json={"page_size": 100},
              timeout=30,
          )

          def sc_prop_text(pg, name):
              p = pg.get("properties", {}).get(name, {})
              pt = p.get("type", "")
              if pt == "title":     return " ".join(t.get("plain_text","") for t in p.get("title",[]))
              if pt == "rich_text": return " ".join(t.get("plain_text","") for t in p.get("rich_text",[]))
              if pt == "select":    return (p.get("select") or {}).get("name","")
              return ""

          all_mysteries = {}
          if all_svc_r.ok:
              for pg in all_svc_r.json().get("results", []):
                  g = sc_prop_text(pg, "God")
                  m2 = sc_prop_text(pg, "Mystery")
                  if g and m2:
                      all_mysteries.setdefault(g, set()).add(m2)

          GRACE_THRESHOLDS = {
              "Himbo":  12,
              "Eros":   12,
              "Hermes":  9,
              "Hestio":  9,
              "Apollo": 12,
          }

          gods_in_log = [row[0] for row in conn.execute(
              "SELECT DISTINCT god FROM completion_log WHERE god IS NOT NULL AND god != ''"
          ).fetchall()]

          gods_data = {}
          for g in gods_in_log:
              grace_total  = conn.execute(
                  "SELECT COALESCE(SUM(grace_earned),0) FROM completion_log WHERE god=?", (g,)
              ).fetchone()[0]
              favour_total = conn.execute(
                  "SELECT COALESCE(SUM(favour_value),0) FROM completion_log WHERE god=?", (g,)
              ).fetchone()[0]
              mystery_counts = {m2: 0 for m2 in all_mysteries.get(g, set())}
              for m2, grace in conn.execute(
                  "SELECT mystery, COALESCE(SUM(grace_earned),0) FROM completion_log WHERE god=? AND COALESCE(mystery,'')!='' GROUP BY mystery",
                  (g,)
              ).fetchall():
                  mystery_counts[m2] = round(grace, 2)
              gods_data[g] = {
                  "grace_total":            round(grace_total, 2),
                  "grace_threshold":        GRACE_THRESHOLDS.get(g, 0),
                  "favour_earned":          round(favour_total, 2),
                  "completions_by_mystery": mystery_counts,
              }

          favour_grand_total = round(sum(g["favour_earned"] for g in gods_data.values()), 2)

          completed_trials = [
              {
                  "service_name":  row[0],
                  "god":           row[1],
                  "date_completed":row[2],
                  "grace_earned":  row[3],
                  "favour_value":  row[4],
                  "mystery":       row[5] or "",
                  "notes":         row[6],
              }
              for row in conn.execute(
                  "SELECT service_name, god, date_completed, grace_earned, favour_value, "
                  "COALESCE(mystery,''), notes "
                  "FROM completion_log WHERE tier='Trial' ORDER BY date_completed DESC"
              ).fetchall()
          ]

          # Devotion completions — used by devotions.html to know what's already
          # ticked off today (and, incidentally, on any other day it re-opens).
          devotion_completions = [
              {
                  "notion_service_id": row[0],
                  "service_name":      row[1],
                  "god":               row[2],
                  "date_completed":    row[3],
              }
              for row in conn.execute(
                  "SELECT notion_service_id, service_name, god, date_completed "
                  "FROM completion_log WHERE tier='Devotion' ORDER BY date_completed DESC LIMIT 500"
              ).fetchall()
          ]

          with open("data/grace.json", "w") as f:
              json.dump({
                  "updated_at":           datetime.utcnow().isoformat() + "Z",
                  "favour_total":         favour_grand_total,
                  "gods":                 gods_data,
                  "completed_trials":     completed_trials,
                  "devotion_completions": devotion_completions,
              }, f, indent=2)
          print(f"grace.json updated — favour_total={favour_grand_total}")
          conn.close()
          EOF

      - name: Commit data files
        run: |
          git config user.name "Dante"
          git config user.email "dante@chorus-boys"
          git add data/grace.db data/grace.json
          git diff --staged --quiet || git commit -m "chore: devotion complete — ${{ inputs.service_name }} on ${{ inputs.date_completed }}"
          git pull --rebase
          git push
