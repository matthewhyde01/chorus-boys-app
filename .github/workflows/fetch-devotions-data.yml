name: Fetch Devotions Data

on:
  workflow_dispatch:

# Triggered via workflow_dispatch only, same as fetch-himbo-data.yml / fetch-eros-data.yml.
# Exports the full catalog of eligible Devotions (all days, not just today's) plus
# Pool slot counts — devotions.html does the "which day is it in Sydney" and
# pool/slot selection client-side, so this file only needs to be reasonably
# fresh (refreshed whenever the Service Compendium changes), not exactly at
# midnight.

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Devotions + Pools from Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          python - <<'EOF'
          import requests, json, os
          from datetime import datetime

          CHALLENGES_DB = "1345c915-686b-4efd-939c-363c53c5315d"
          POOLS_DB       = "3cf86aa0-5817-412c-bdad-a714d4b591af"

          notion_key = os.environ["NOTION_API_KEY"].strip()
          notion_headers = {
              "Authorization": f"Bearer {notion_key}",
              "Notion-Version": "2022-06-28",
              "content-type": "application/json",
          }

          def prop_text(pg, name):
              p = pg.get("properties", {}).get(name, {})
              pt = p.get("type", "")
              if pt == "title":      return " ".join(t.get("plain_text","") for t in p.get("title",[]))
              if pt == "rich_text":  return " ".join(t.get("plain_text","") for t in p.get("rich_text",[]))
              if pt == "select":     return (p.get("select") or {}).get("name","")
              if pt == "number":     return p.get("number")
              if pt == "multi_select": return [o.get("name","") for o in p.get("multi_select",[])]
              return ""

          # ── Devotions: Tier=Devotion, Status=Active, Data Source=Manual, God != Apollo ──
          devotions_r = requests.post(
              f"https://api.notion.com/v1/databases/{CHALLENGES_DB}/query",
              headers=notion_headers,
              json={
                  "filter": {
                      "and": [
                          {"property": "Tier",        "select": {"equals": "Devotion"}},
                          {"property": "Status",      "select": {"equals": "Active"}},
                          {"property": "Data Source", "select": {"equals": "Manual"}},
                          {"property": "God",         "select": {"does_not_equal": "Apollo"}},
                      ]
                  },
                  "page_size": 100,
              },
              timeout=30,
          )
          devotions_r.raise_for_status()

          devotions = []
          for pg in devotions_r.json().get("results", []):
              devotions.append({
                  "notion_service_id": pg["id"].replace("-", ""),
                  "service_name":      prop_text(pg, "Service"),
                  "god":               prop_text(pg, "God"),
                  "mystery":           prop_text(pg, "Mystery"),
                  "favour_value":      prop_text(pg, "Favour Value") or 0,
                  "pool":              prop_text(pg, "Pool") or "",
                  "frequency_cap":     prop_text(pg, "Frequency Cap") or "1/day",
                  "days":              prop_text(pg, "Days") or [],
              })

          print(f"Devotions: {len(devotions)} eligible rows")

          # ── Pools: name -> slots (blank = show all) ──────────────────────────
          pools_r = requests.post(
              f"https://api.notion.com/v1/databases/{POOLS_DB}/query",
              headers=notion_headers,
              json={"page_size": 100},
              timeout=30,
          )
          pools_r.raise_for_status()

          pools = {}
          for pg in pools_r.json().get("results", []):
              name  = prop_text(pg, "Pool")
              slots = prop_text(pg, "Slots")
              if name:
                  pools[name] = slots  # number or "" (blank = show all)

          print(f"Pools: {pools}")

          with open("data/devotions.json", "w") as f:
              json.dump({
                  "updated_at": datetime.utcnow().isoformat() + "Z",
                  "devotions":  devotions,
                  "pools":      pools,
              }, f, indent=2)
          print(f"devotions.json written — {len(devotions)} devotions, {len(pools)} pools")
          EOF

      - name: Commit data file
        run: |
          git config user.name "Dante"
          git config user.email "dante@chorus-boys"
          git add data/devotions.json
          git diff --staged --quiet || git commit -m "chore: fetch devotions data [$(date -u '+%Y-%m-%d %H:%M')] UTC"
          git pull --rebase
          git push
