name: Fetch Himbo Data

on:
  workflow_dispatch:

# Triggered via workflow_dispatch only. Two sources:
# 1. cron-job.org — scheduled noon + midnight AEST
# 2. Chorus Boys Sync — manual Home Screen shortcut (iOS)
# No internal GitHub cron schedule — all scheduling handled externally.

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Strava data
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'EOF'
          import requests, json, os, subprocess
          from datetime import datetime, timedelta

          # Refresh access token
          client_id = os.environ["STRAVA_CLIENT_ID"].strip()
          client_secret = os.environ["STRAVA_CLIENT_SECRET"].strip()
          refresh_token = os.environ["STRAVA_REFRESH_TOKEN"].strip()
          for name, val in [("STRAVA_CLIENT_ID", client_id), ("STRAVA_CLIENT_SECRET", client_secret), ("STRAVA_REFRESH_TOKEN", refresh_token)]:
              if not val:
                  raise ValueError(f"Secret {name} is not set")
          r = requests.post("https://www.strava.com/oauth/token", data={
              "client_id": client_id,
              "client_secret": client_secret,
              "refresh_token": refresh_token,
              "grant_type": "refresh_token"
          })
          if not r.ok:
              print(f"Strava token refresh failed {r.status_code}: {r.text}")
              r.raise_for_status()
          token_data = r.json()
          access_token = token_data["access_token"]

          # Strava rotates refresh tokens — update the secret so next run works
          new_refresh = token_data.get("refresh_token", os.environ["STRAVA_REFRESH_TOKEN"])
          if new_refresh != os.environ["STRAVA_REFRESH_TOKEN"]:
              subprocess.run(
                  ["gh", "secret", "set", "STRAVA_REFRESH_TOKEN", "--body", new_refresh,
                   "--repo", os.environ["REPO"]],
                  env={**os.environ, "GH_TOKEN": os.environ["GH_TOKEN"]},
                  check=True
              )
              print("Strava: refresh token rotated and secret updated")

          # Fetch last 14 days of activities
          since = int((datetime.utcnow() - timedelta(days=14)).timestamp())
          activities = requests.get(
              "https://www.strava.com/api/v3/athlete/activities",
              headers={"Authorization": f"Bearer {access_token}"},
              params={"after": since, "per_page": 50}
          )
          activities.raise_for_status()

          os.makedirs("data", exist_ok=True)
          with open("data/strava.json", "w") as f:
              json.dump({
                  "updated_at": datetime.utcnow().isoformat() + "Z",
                  "activities": activities.json()
              }, f, indent=2)

          print(f"Strava: wrote {len(activities.json())} activities")
          EOF

      - name: Fetch Withings data
        env:
          WITHINGS_CLIENT_ID: ${{ secrets.WITHINGS_CLIENT_ID }}
          WITHINGS_CLIENT_SECRET: ${{ secrets.WITHINGS_CLIENT_SECRET }}
          WITHINGS_REFRESH_TOKEN: ${{ secrets.WITHINGS_REFRESH_TOKEN }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'EOF'
          import requests, json, os, subprocess
          from datetime import datetime, timedelta

          # Refresh access token
          r = requests.post("https://wbsapi.withings.net/v2/oauth2", data={
              "action": "requesttoken",
              "client_id": os.environ["WITHINGS_CLIENT_ID"],
              "client_secret": os.environ["WITHINGS_CLIENT_SECRET"],
              "refresh_token": os.environ["WITHINGS_REFRESH_TOKEN"],
              "grant_type": "refresh_token"
          })
          r.raise_for_status()
          token_data = r.json()
          if token_data.get("status") != 0:
              print(f"Withings token refresh error: {json.dumps(token_data)}")
              raise RuntimeError(f"Withings API returned status {token_data.get('status')}: {token_data.get('error', 'unknown error')}")
          body = token_data["body"]
          access_token = body["access_token"]

          # Withings rotates refresh tokens — update the secret so next run works
          new_refresh = body.get("refresh_token", os.environ["WITHINGS_REFRESH_TOKEN"])
          if new_refresh != os.environ["WITHINGS_REFRESH_TOKEN"]:
              subprocess.run(
                  ["gh", "secret", "set", "WITHINGS_REFRESH_TOKEN", "--body", new_refresh,
                   "--repo", os.environ["REPO"]],
                  env={**os.environ, "GH_TOKEN": os.environ["GH_TOKEN"]},
                  check=True
              )
              print("Withings: refresh token rotated and secret updated")

          # Fetch body composition — last 30 days
          # Measure types: 1=weight, 6=fat%, 8=fat mass, 76=muscle mass, 77=hydration
          since = int((datetime.utcnow() - timedelta(days=30)).timestamp())
          measures = requests.post(
              "https://wbsapi.withings.net/measure",
              headers={"Authorization": f"Bearer {access_token}"},
              data={
                  "action": "getmeas",
                  "meastypes": "1,6,76,77",
                  "category": 1,
                  "startdate": since
              }
          )
          measures.raise_for_status()

          os.makedirs("data", exist_ok=True)
          with open("data/withings.json", "w") as f:
              json.dump({
                  "updated_at": datetime.utcnow().isoformat() + "Z",
                  "measures": measures.json()
              }, f, indent=2)

          print("Withings: data written")
          EOF

      - name: Fetch Himbo voice from Notion + generate AI cards
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python - <<'EOF'
          import requests, json, os, time
          from datetime import datetime, timedelta

          notion_key = os.environ["NOTION_API_KEY"].strip()
          anthropic_key = os.environ["ANTHROPIC_API_KEY"].strip()
          if not notion_key:
              raise ValueError("Secret NOTION_API_KEY is not set")
          if not anthropic_key:
              raise ValueError("Secret ANTHROPIC_API_KEY is not set")

          notion_headers = {
              "Authorization": f"Bearer {notion_key}",
              "Notion-Version": "2022-06-28",
          }

          PAGE_ID = "379db4862bcd81dbbe27d4a8dbb1fa58"
          TEXT_TYPES = {"paragraph", "heading_1", "heading_2", "heading_3",
                        "bulleted_list_item", "numbered_list_item", "quote", "callout", "toggle"}

          def extract_block_text(block):
              bt = block.get("type", "")
              if bt in TEXT_TYPES:
                  rt = block.get(bt, {}).get("rich_text", [])
                  return " ".join(t.get("plain_text", "") for t in rt)
              if bt == "child_database":
                  return block.get("child_database", {}).get("title", "")
              if bt == "child_page":
                  return block.get("child_page", {}).get("title", "")
              return ""

          def fetch_blocks(block_id, depth=0):
              results = []
              cursor = None
              while True:
                  params = "?page_size=100"
                  if cursor:
                      params += f"&start_cursor={cursor}"
                  r = requests.get(
                      f"https://api.notion.com/v1/blocks/{block_id}/children{params}",
                      headers=notion_headers
                  )
                  if not r.ok:
                      print(f"Notion fetch failed for {block_id} depth={depth}: {r.status_code}")
                      break
                  data = r.json()
                  for block in data.get("results", []):
                      bt = block.get("type", "")
                      text = extract_block_text(block)
                      children = []
                      if bt == "child_database" and depth < 3:
                          children = fetch_database_pages(block["id"], depth)
                      elif block.get("has_children") and depth < 5:
                          children = fetch_blocks(block["id"], depth + 1)
                      results.append({"type": bt, "text": text, "children": children})
                  if not data.get("has_more"):
                      break
                  cursor = data.get("next_cursor")
              return results

          def fetch_database_pages(db_id, depth=0):
              r = requests.post(
                  f"https://api.notion.com/v1/databases/{db_id}/query",
                  headers={**notion_headers, "content-type": "application/json"},
                  json={
                      "page_size": 10,
                      "sorts": [{"timestamp": "created_time", "direction": "descending"}],
                  },
                  timeout=30,
              )
              if not r.ok:
                  print(f"DB query failed for {db_id}: {r.status_code} {r.text[:200]}")
                  return []
              pages = r.json().get("results", [])
              results = []
              for page in pages:
                  title = ""
                  for prop in page.get("properties", {}).values():
                      if prop.get("type") == "title":
                          title = " ".join(t.get("plain_text", "") for t in prop.get("title", []))
                          break
                  if not title:
                      title = page.get("id", "")[:8]
                  children = fetch_blocks(page["id"], depth + 1) if depth < 3 else []
                  results.append({"type": "heading_2", "text": title, "children": children})
              return results

          def flatten_blocks(blocks, indent=0):
              lines = []
              prefix = "  " * indent
              for b in blocks:
                  if b["text"]:
                      lines.append(prefix + b["text"])
                  if b.get("children"):
                      lines.extend(flatten_blocks(b["children"], indent + 1))
              return lines

          print("Fetching Notion page...")
          blocks = fetch_blocks(PAGE_ID)
          full_text = "\n".join(flatten_blocks(blocks))

          os.makedirs("data", exist_ok=True)
          with open("data/himbo_voice.json", "w") as f:
              json.dump({"voice_brief": full_text}, f, indent=2)
          print(f"Notion: voice brief written ({len(full_text)} chars)")

          def claude_call(system, user, model="claude-haiku-4-5-20251001", max_tokens=1000):
              r = requests.post(
                  "https://api.anthropic.com/v1/messages",
                  headers={
                      "x-api-key": anthropic_key,
                      "anthropic-version": "2023-06-01",
                      "content-type": "application/json",
                  },
                  json={
                      "model": model,
                      "max_tokens": max_tokens,
                      "system": system,
                      "messages": [{"role": "user", "content": user}],
                  },
                  timeout=60,
              )
              r.raise_for_status()
              return r.json()["content"][0]["text"].strip()

          def strip_fences(raw):
              t = raw.strip()
              if t.startswith("```"):
                  t = "\n".join(t.split("\n")[1:])
                  t = t.rsplit("```", 1)[0]
              return t.strip()

          print("Extracting challenges...")
          raw_challenges = claude_call(
              "You are a data parser. Extract challenges from the Himbo Notion page. "
              "Look in the Challenges section. Find ALL of:\n"
              "1. Current challenge for Track 1 (Visibility), Track 2 (Physique), Track 3 (Internal Work). "
              "Look for 'Current challenge:' text under each track heading.\n"
              "2. Completed challenges for each track — listed under 'Completed challenges:'. "
              "Each completed challenge may have a date. Return as an array of objects with 'text' and 'date' fields.\n"
              "3. All stretch challenges listed under 'Stretch Challenges'.\n"
              "Return ONLY valid JSON, nothing else:\n"
              '{"track1": "text or none", "track2": "text or none", "track3": "text or none", '
              '"completed": {'
              '"track1": [{"text": "...", "date": "..."}], '
              '"track2": [], '
              '"track3": []'
              '}, '
              '"stretch": ["challenge 1", "challenge 2"]}\n'
              "Use \"none\" for missing current challenges. "
              "Use empty arrays [] where there are no completed challenges or stretch items. "
              "Do not include assignment dates in the current challenge text.",
              f"Himbo Notion page content:\n\n{full_text}"
          )
          try:
              parsed = json.loads(strip_fences(raw_challenges))
              tracks = {
                  "track1": parsed.get("track1", "none"),
                  "track2": parsed.get("track2", "none"),
                  "track3": parsed.get("track3", "none"),
              }
              completed = parsed.get("completed", {"track1": [], "track2": [], "track3": []})
              stretch = parsed.get("stretch", [])
          except Exception as e:
              print(f"Challenges parse error: {e}\nRaw: {raw_challenges[:500]}")
              tracks = {"track1": "none", "track2": "none", "track3": "none"}
              completed = {"track1": [], "track2": [], "track3": []}
              stretch = []

          with open("data/himbo_challenges.json", "w") as f:
              json.dump({
                  "updated_at": datetime.utcnow().isoformat() + "Z",
                  "tracks": tracks,
                  "completed": completed,
                  "stretch": stretch,
              }, f, indent=2)
          print(f"Challenges: {tracks}")
          print(f"Completed: {completed}")
          print(f"Stretch: {stretch}")

          print("Generating Joy Police card...")
          import re
          saturday_blocks = re.findall(
              r'(?:Saturday\s+\d+\s+\w+\s+\d{4}.*?)(?=Saturday\s+\d+\s+\w+\s+\d{4}|$)',
              full_text, re.DOTALL | re.IGNORECASE
          )
          recent_entries = "\n\n---\n\n".join(saturday_blocks[-2:])[:3000] if saturday_blocks else ""

          if recent_entries:
              voice_context = full_text[:1500]
              track3_challenge = tracks.get("track3", "none")

              raw_joy = claude_call(
                  f"You are Himbo. Here is your character context:\n{voice_context}\n\n"
                  "Write a Joy Police breakdown based on the last 2 Saturday reflection log entries. "
                  "Return ONLY valid JSON with exactly these three fields:\n"
                  '{"rounds": "...", "pattern": "...", "focus": "..."}\n\n'
                  '"rounds": Specific wins and losses from this week. Named and concrete — '
                  'call out the actual moments. e.g. "Poncho stayed on at Balmoral — they got that one. '
                  'But the black bag to Lavendra? You got that one." 2-4 sentences.\n'
                  '"pattern": ONE line on what the joy police are currently doing overall. '
                  'e.g. "They\'re loud in front of your people, quiet with strangers."\n'
                  f'"focus": State this week\'s Track 3 challenge directly: "{track3_challenge}"\n\n'
                  "Himbo voice: warm, mischievous, specific, never preachy.",
                  f"Last 2 Saturday reflection log entries:\n\n{recent_entries}",
                  model="claude-sonnet-4-6",
                  max_tokens=400,
              )
              try:
                  joy_data = json.loads(strip_fences(raw_joy))
              except Exception as e:
                  print(f"Joy parse error: {e}\nRaw: {raw_joy[:300]}")
                  joy_data = {"rounds": raw_joy, "pattern": "", "focus": track3_challenge}
          else:
              print("No Saturday reflection entries found in page content yet.")
              joy_data = {
                  "rounds": "",
                  "pattern": "",
                  "focus": tracks.get("track3", "none"),
              }

          with open("data/himbo_joy.json", "w") as f:
              json.dump({"updated_at": datetime.utcnow().isoformat() + "Z", **joy_data}, f, indent=2)
          print(f"Joy Police written: rounds={len(joy_data.get('rounds',''))} chars")

          print("Generating sleep AI card...")
          sleep_analysis = ""
          try:
              with open("data/sleep.json") as f:
                  sleep_csv = f.read()
              sleep_sample = "\n".join(sleep_csv.strip().split("\n")[:55])
              voice_context = full_text[:1500]

              sleep_analysis = claude_call(
                  f"You are Himbo — the warm, mischievous, specific voice for Matt's wellness dashboard. "
                  f"Here is context about who Himbo is:\n{voice_context}\n\n"
                  "Write a short response (3–4 sentences) about Matt's sleep over the last 7 days. "
                  "Be specific to the actual numbers in the data. "
                  "His sleep context: target bedtime 8:30pm. Interventions he's trying: "
                  "Smiling Mind nightly, magnesium + creatine taken earlier, "
                  "hot shower + cold blast, yin yoga wind-down, lavender oil, screens off early. "
                  "Celebrate wins. Name gaps without moralising. Warm, mischievous, never preachy. "
                  "No emojis. No markdown. No bullet points. Speak directly to him.",
                  f"Last 7 days of sleep data (CSV format):\n{sleep_sample}",
                  model="claude-sonnet-4-6",
                  max_tokens=300,
              )
          except FileNotFoundError:
              sleep_analysis = "No sleep data synced yet — check back after your next export."
          except Exception as e:
              print(f"Sleep AI error: {e}")
              sleep_analysis = ""

          with open("data/himbo_sleep_ai.json", "w") as f:
              json.dump({"updated_at": datetime.utcnow().isoformat() + "Z", "analysis": sleep_analysis}, f, indent=2)
          print(f"Sleep AI written ({len(sleep_analysis)} chars)")
          EOF

      - name: Generate activity summaries
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python - <<'EOF'
          import requests, json, os
          from datetime import datetime, timedelta

          api_key = os.environ["ANTHROPIC_API_KEY"].strip()
          if not api_key:
              raise ValueError("Secret ANTHROPIC_API_KEY is not set")

          with open("data/strava.json") as f:
              strava = json.load(f)
          with open("data/himbo_voice.json") as f:
              voice = json.load(f)

          voice_brief = voice.get("voice_brief", "")
          system_prompt = (voice_brief + "\n\n" if voice_brief else "") + \
              "Write a 4–5 sentence summary of this workout for Patroclus. Go beyond describing the numbers — interpret them. Was this a hard effort or recovery work? How does the suffer score reflect what his body went through? What does this activity mean in the context of the week's training? Speak directly to him, warm and a little dramatic. No emojis. No markdown."

          cutoff = datetime.utcnow() - timedelta(days=14)
          activities = [
              a for a in strava["activities"]
              if datetime.strptime(a["start_date"][:19], "%Y-%m-%dT%H:%M:%S") >= cutoff
          ]

          summaries = {}
          try:
              with open("data/activity_summaries.json") as f:
                  summaries = json.load(f)
          except FileNotFoundError:
              pass

          for a in activities:
              aid = str(a["id"])
              if aid in summaries:
                  print(f"Skipping {a['name']} (already summarized)")
                  continue

              sport = a.get("sport_type") or a.get("type", "")
              dist = a.get("distance", 0)
              speed = a.get("average_speed", 0)

              if sport == "Swim":
                  dist_str = f"{round(dist)}m"
              else:
                  dist_str = f"{dist / 1000:.1f}km"

              moving = a.get("moving_time", 0)
              h, rem = divmod(moving, 3600)
              m, s = divmod(rem, 60)
              time_str = f"{h}h {m}m" if h else f"{m}m"

              if speed > 0:
                  if sport == "Swim":
                      pace_secs = 100 / speed
                  else:
                      pace_secs = 1000 / speed
                  pace_str = f"{int(pace_secs // 60)}:{int(pace_secs % 60):02d} {'per 100m' if sport == 'Swim' else 'per km'}"
              else:
                  pace_str = None

              lines = [
                  f"Activity: {a['name']}",
                  f"Type: {sport}",
                  f"Date: {a['start_date_local'][:10]}",
                  f"Distance: {dist_str}",
                  f"Moving time: {time_str}",
              ]
              if pace_str:
                  lines.append(f"Average pace: {pace_str}")
              if a.get("average_heartrate"):
                  lines.append(f"Avg heart rate: {round(a['average_heartrate'])} bpm")
              if a.get("max_heartrate"):
                  lines.append(f"Max heart rate: {round(a['max_heartrate'])} bpm")
              if a.get("total_elevation_gain", 0) > 0:
                  lines.append(f"Elevation gain: {round(a['total_elevation_gain'])}m")
              if a.get("suffer_score"):
                  lines.append(f"Suffer score: {a['suffer_score']}")
              if a.get("kudos_count"):
                  lines.append(f"Kudos: {a['kudos_count']}")

              context = "\n".join(lines)

              resp = requests.post(
                  "https://api.anthropic.com/v1/messages",
                  headers={
                      "x-api-key": api_key,
                      "anthropic-version": "2023-06-01",
                      "content-type": "application/json",
                  },
                  json={
                      "model": "claude-sonnet-4-6",
                      "max_tokens": 500,
                      "system": system_prompt,
                      "messages": [{"role": "user", "content": context}],
                  },
                  timeout=30,
              )
              resp.raise_for_status()
              data = resp.json()
              text = data["content"][0]["text"]
              summaries[aid] = text
              print(f"Summarized: {a['name']}")

          with open("data/activity_summaries.json", "w") as f:
              json.dump(summaries, f, indent=2)

          print(f"Done. {len(summaries)} total summaries stored.")
          EOF

      - name: Commit data files
        run: |
          git config user.name "Dante"
          git config user.email "dante@chorus-boys"
          git add data/strava.json data/withings.json data/himbo_voice.json data/activity_summaries.json data/himbo_challenges.json data/himbo_joy.json data/himbo_sleep_ai.json
          git diff --staged --quiet || git commit -m "chore: update himbo data [$(date -u '+%Y-%m-%d %H:%M')] UTC"
          git pull --rebase
          git push
