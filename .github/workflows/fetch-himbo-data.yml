name: Fetch Himbo Data

on:
  workflow_dispatch:

# Triggered via workflow_dispatch only. Two sources:
# 1. cron-job.org â€” scheduled noon + midnight AEST
# 2. Chorus Boys Sync â€” manual Home Screen shortcut (iOS)
# No internal GitHub cron schedule â€” all scheduling handled externally.

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Strava data
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'EOF'
          import requests, json, os, subprocess
          from datetime import datetime, timedelta

          # Refresh access token
          client_id = os.environ["STRAVA_CLIENT_ID"].strip()
          client_secret = os.environ["STRAVA_CLIENT_SECRET"].strip()
          refresh_token = os.environ["STRAVA_REFRESH_TOKEN"].strip()
          for name, val in [("STRAVA_CLIENT_ID", client_id), ("STRAVA_CLIENT_SECRET", client_secret), ("STRAVA_REFRESH_TOKEN", refresh_token)]:
              if not val:
                  raise ValueError(f"Secret {name} is not set")
          r = requests.post("https://www.strava.com/oauth/token", data={
              "client_id": client_id,
              "client_secret": client_secret,
              "refresh_token": refresh_token,
              "grant_type": "refresh_token"
          })
          if not r.ok:
              print(f"Strava token refresh failed {r.status_code}: {r.text}")
              r.raise_for_status()
          token_data = r.json()
          access_token = token_data["access_token"]

          # Strava rotates refresh tokens â€” update the secret so next run works
          new_refresh = token_data.get("refresh_token", os.environ["STRAVA_REFRESH_TOKEN"])
          if new_refresh != os.environ["STRAVA_REFRESH_TOKEN"]:
              subprocess.run(
                  ["gh", "secret", "set", "STRAVA_REFRESH_TOKEN", "--body", new_refresh,
                   "--repo", os.environ["REPO"]],
                  env={**os.environ, "GH_TOKEN": os.environ["GH_TOKEN"]},
                  check=True
              )
              print("Strava: refresh token rotated and secret updated")

          # Fetch last 14 days of activities
          since = int((datetime.utcnow() - timedelta(days=14)).timestamp())
          activities = requests.get(
              "https://www.strava.com/api/v3/athlete/activities",
              headers={"Authorization": f"Bearer {access_token}"},
              params={"after": since, "per_page": 50}
          )
          activities.raise_for_status()

          os.makedirs("data", exist_ok=True)
          with open("data/strava.json", "w") as f:
              json.dump({
                  "updated_at": datetime.utcnow().isoformat() + "Z",
                  "activities": activities.json()
              }, f, indent=2)

          print(f"Strava: wrote {len(activities.json())} activities")
          EOF

      - name: Fetch Withings data
        env:
          WITHINGS_CLIENT_ID: ${{ secrets.WITHINGS_CLIENT_ID }}
          WITHINGS_CLIENT_SECRET: ${{ secrets.WITHINGS_CLIENT_SECRET }}
          WITHINGS_REFRESH_TOKEN: ${{ secrets.WITHINGS_REFRESH_TOKEN }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'EOF'
          import requests, json, os, subprocess
          from datetime import datetime, timedelta

          # Refresh access token
          r = requests.post("https://wbsapi.withings.net/v2/oauth2", data={
              "action": "requesttoken",
              "client_id": os.environ["WITHINGS_CLIENT_ID"],
              "client_secret": os.environ["WITHINGS_CLIENT_SECRET"],
              "refresh_token": os.environ["WITHINGS_REFRESH_TOKEN"],
              "grant_type": "refresh_token"
          })
          r.raise_for_status()
          token_data = r.json()
          if token_data.get("status") != 0:
              print(f"Withings token refresh error: {json.dumps(token_data)}")
              raise RuntimeError(f"Withings API returned status {token_data.get('status')}: {token_data.get('error', 'unknown error')}")
          body = token_data["body"]
          access_token = body["access_token"]

          # Withings rotates refresh tokens â€” update the secret so next run works
          new_refresh = body.get("refresh_token", os.environ["WITHINGS_REFRESH_TOKEN"])
          if new_refresh != os.environ["WITHINGS_REFRESH_TOKEN"]:
              subprocess.run(
                  ["gh", "secret", "set", "WITHINGS_REFRESH_TOKEN", "--body", new_refresh,
                   "--repo", os.environ["REPO"]],
                  env={**os.environ, "GH_TOKEN": os.environ["GH_TOKEN"]},
                  check=True
              )
              print("Withings: refresh token rotated and secret updated")

          # Fetch body composition â€” last 30 days
          # Measure types: 1=weight, 6=fat%, 8=fat mass, 76=muscle mass, 77=hydration
          since = int((datetime.utcnow() - timedelta(days=30)).timestamp())
          measures = requests.post(
              "https://wbsapi.withings.net/measure",
              headers={"Authorization": f"Bearer {access_token}"},
              data={
                  "action": "getmeas",
                  "meastypes": "1,6,76,77",
                  "category": 1,
                  "startdate": since
              }
          )
          measures.raise_for_status()

          os.makedirs("data", exist_ok=True)
          with open("data/withings.json", "w") as f:
              json.dump({
                  "updated_at": datetime.utcnow().isoformat() + "Z",
                  "measures": measures.json()
              }, f, indent=2)

          print("Withings: data written")
          EOF

      - name: Fetch Himbo voice from Notion + generate AI cards
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python - <<'EOF'
          import requests, json, os, time, csv, io, re
          from datetime import datetime, timedelta

          notion_key = os.environ["NOTION_API_KEY"].strip()
          anthropic_key = os.environ["ANTHROPIC_API_KEY"].strip()
          if not notion_key:
              raise ValueError("Secret NOTION_API_KEY is not set")
          if not anthropic_key:
              raise ValueError("Secret ANTHROPIC_API_KEY is not set")

          notion_headers = {
              "Authorization": f"Bearer {notion_key}",
              "Notion-Version": "2022-06-28",
          }

          PAGE_ID = "379db4862bcd81dbbe27d4a8dbb1fa58"
          TEXT_TYPES = {"paragraph", "heading_1", "heading_2", "heading_3",
                        "bulleted_list_item", "numbered_list_item", "quote", "callout", "toggle"}

          def extract_block_text(block):
              bt = block.get("type", "")
              if bt in TEXT_TYPES:
                  rt = block.get(bt, {}).get("rich_text", [])
                  return " ".join(t.get("plain_text", "") for t in rt)
              if bt == "child_database":
                  return block.get("child_database", {}).get("title", "")
              if bt == "child_page":
                  return block.get("child_page", {}).get("title", "")
              return ""

          def fetch_blocks(block_id, depth=0):
              results = []
              cursor = None
              while True:
                  params = "?page_size=100"
                  if cursor:
                      params += f"&start_cursor={cursor}"
                  r = requests.get(
                      f"https://api.notion.com/v1/blocks/{block_id}/children{params}",
                      headers=notion_headers
                  )
                  if not r.ok:
                      print(f"Notion fetch failed for {block_id} depth={depth}: {r.status_code}")
                      break
                  data = r.json()
                  for block in data.get("results", []):
                      bt = block.get("type", "")
                      text = extract_block_text(block)
                      children = []
                      if bt == "child_database" and depth < 3:
                          children = fetch_database_pages(block["id"], depth)
                      elif block.get("has_children") and depth < 5:
                          children = fetch_blocks(block["id"], depth + 1)
                      results.append({"type": bt, "text": text, "children": children})
                  if not data.get("has_more"):
                      break
                  cursor = data.get("next_cursor")
              return results

          def fetch_database_pages(db_id, depth=0):
              r = requests.post(
                  f"https://api.notion.com/v1/databases/{db_id}/query",
                  headers={**notion_headers, "content-type": "application/json"},
                  json={
                      "page_size": 10,
                      "sorts": [{"timestamp": "created_time", "direction": "descending"}],
                  },
                  timeout=30,
              )
              if not r.ok:
                  print(f"DB query failed for {db_id}: {r.status_code} {r.text[:200]}")
                  return []
              pages = r.json().get("results", [])
              results = []
              for page in pages:
                  title = ""
                  for prop in page.get("properties", {}).values():
                      if prop.get("type") == "title":
                          title = " ".join(t.get("plain_text", "") for t in prop.get("title", []))
                          break
                  if not title:
                      title = page.get("id", "")[:8]
                  children = fetch_blocks(page["id"], depth + 1) if depth < 3 else []
                  results.append({"type": "heading_2", "text": title, "children": children})
              return results

          def flatten_blocks(blocks, indent=0):
              lines = []
              prefix = "  " * indent
              for b in blocks:
                  if b["text"]:
                      lines.append(prefix + b["text"])
                  if b.get("children"):
                      lines.extend(flatten_blocks(b["children"], indent + 1))
              return lines

          print("Fetching Notion page...")
          blocks = fetch_blocks(PAGE_ID)
          full_text = "\n".join(flatten_blocks(blocks))

          os.makedirs("data", exist_ok=True)
          with open("data/himbo_voice.json", "w") as f:
              json.dump({"voice_brief": full_text}, f, indent=2)
          print(f"Notion: voice brief written ({len(full_text)} chars)")

          def claude_call(system, user, model="claude-haiku-4-5-20251001", max_tokens=1000):
              r = requests.post(
                  "https://api.anthropic.com/v1/messages",
                  headers={
                      "x-api-key": anthropic_key,
                      "anthropic-version": "2023-06-01",
                      "content-type": "application/json",
                  },
                  json={
                      "model": model,
                      "max_tokens": max_tokens,
                      "system": system,
                      "messages": [{"role": "user", "content": user}],
                  },
                  timeout=60,
              )
              r.raise_for_status()
              return r.json()["content"][0]["text"].strip()

          def strip_fences(raw):
              t = raw.strip()
              if t.startswith("```"):
                  t = "\n".join(t.split("\n")[1:])
                  t = t.rsplit("```", 1)[0]
              return t.strip()

          print("Querying Service Compendium challenges (Â§6)...")
          CHALLENGES_DB_ID = "dc3f975b-7f4d-4361-b859-079936ccdd10"
          challenges_payload = {
              "filter": {
                  "and": [
                      {"property": "God", "select": {"equals": "Himbo"}},
                      {"or": [
                          {"property": "Status", "select": {"equals": "Active"}},
                          {"property": "Status", "select": {"equals": "Planned"}},
                      ]},
                  ]
              },
              "sorts": [{"property": "Status", "direction": "ascending"}],
              "page_size": 50,
          }
          ch_r = requests.post(
              f"https://api.notion.com/v1/databases/{CHALLENGES_DB_ID}/query",
              headers={**notion_headers, "content-type": "application/json"},
              json=challenges_payload,
              timeout=30,
          )
          ch_r.raise_for_status()
          ch_pages = ch_r.json().get("results", [])

          def prop_text(page, name):
              p = page.get("properties", {}).get(name, {})
              pt = p.get("type", "")
              if pt == "title":   return " ".join(t.get("plain_text","") for t in p.get("title",[]))
              if pt == "rich_text": return " ".join(t.get("plain_text","") for t in p.get("rich_text",[]))
              if pt == "select":  return (p.get("select") or {}).get("name", "")
              if pt == "date":    return (p.get("date") or {}).get("start", "")
              if pt == "number":  return p.get("number")
              return ""

          challenges_list = []
          grace_total = 0
          for pg in ch_pages:
              grace_val = prop_text(pg, "Grace Earned")
              if grace_val:
                  try: grace_total += float(grace_val)
                  except: pass
              challenges_list.append({
                  "service":            prop_text(pg, "Service"),
                  "tier":               prop_text(pg, "Tier"),
                  "mystery":            prop_text(pg, "Mystery"),
                  "status":             prop_text(pg, "Status"),
                  "cadence":            prop_text(pg, "Cadence"),
                  "due_date":           prop_text(pg, "Due Date"),
                  "trigger_condition":  prop_text(pg, "Trigger Condition"),
                  "favour_value":       prop_text(pg, "Favour Value"),
                  "grace_earned":       prop_text(pg, "Grace Earned"),
              })

          # Also sum grace from Completed services for the jewellery section
          grace_r = requests.post(
              f"https://api.notion.com/v1/databases/{CHALLENGES_DB_ID}/query",
              headers={**notion_headers, "content-type": "application/json"},
              json={
                  "filter": {"and": [
                      {"property": "God", "select": {"equals": "Himbo"}},
                      {"property": "Status", "select": {"equals": "Complete"}},
                  ]},
                  "page_size": 100,
              },
              timeout=30,
          )
          if grace_r.ok:
              for pg in grace_r.json().get("results", []):
                  gv = prop_text(pg, "Grace Earned")
                  if gv:
                      try: grace_total += float(gv)
                      except: pass

          with open("data/himbo_challenges.json", "w") as f:
              json.dump({
                  "updated_at": datetime.utcnow().isoformat() + "Z",
                  "challenges": challenges_list,
                  "grace_total": grace_total,
              }, f, indent=2)
          print(f"Challenges: {len(challenges_list)} active/planned, grace_total={grace_total}")

          print("Generating Joy Police card...")
          saturday_blocks = re.findall(
              r'(?:Saturday\s+\d+\s+\w+\s+\d{4}.*?)(?=Saturday\s+\d+\s+\w+\s+\d{4}|$)',
              full_text, re.DOTALL | re.IGNORECASE
          )
          recent_entries = "\n\n---\n\n".join(saturday_blocks[-2:])[:3000] if saturday_blocks else ""

          if recent_entries:
              voice_context = full_text[:1500]
              track3_challenge = tracks.get("track3", "none")

              raw_joy = claude_call(
                  f"You are Himbo. Here is your character context:\n{voice_context}\n\n"
                  "Write a Joy Police breakdown based on the last 2 Saturday reflection log entries. "
                  "Return ONLY valid JSON with exactly these three fields:\n"
                  '{"rounds": "...", "pattern": "...", "focus": "..."}\n\n'
                  '"rounds": Specific wins and losses from this week. Named and concrete â€” '
                  'call out the actual moments. e.g. "Poncho stayed on at Balmoral â€” they got that one. '
                  'But the black bag to Lavendra? You got that one." 2-4 sentences.\n'
                  '"pattern": ONE line on what the joy police are currently doing overall. '
                  'e.g. "They\'re loud in front of your people, quiet with strangers."\n'
                  f'"focus": State this week\'s Track 3 challenge directly: "{track3_challenge}"\n\n'
                  "Himbo voice: warm, mischievous, specific, never preachy.",
                  f"Last 2 Saturday reflection log entries:\n\n{recent_entries}",
                  model="claude-sonnet-4-6",
                  max_tokens=400,
              )
              try:
                  joy_data = json.loads(strip_fences(raw_joy))
              except Exception as e:
                  print(f"Joy parse error: {e}\nRaw: {raw_joy[:300]}")
                  joy_data = {"rounds": raw_joy, "pattern": "", "focus": track3_challenge}
          else:
              print("No Saturday reflection entries found in page content yet.")
              joy_data = {
                  "rounds": "",
                  "pattern": "",
                  "focus": tracks.get("track3", "none"),
              }

          with open("data/himbo_joy.json", "w") as f:
              json.dump({"updated_at": datetime.utcnow().isoformat() + "Z", **joy_data}, f, indent=2)
          print(f"Joy Police written: rounds={len(joy_data.get('rounds',''))} chars")

          print("Generating sleep AI card (Â§4 â€” pre-bucketed by night)...")
          sleep_analysis = ""
          try:
              with open("data/sleep.json") as f:
                  sleep_csv = f.read()

              # Pre-bucket CSV rows by night: sessions starting before noon belong to the previous night
              reader = csv.DictReader(io.StringIO(sleep_csv))
              nights = {}
              for row in reader:
                  start_str = row.get("From") or row.get("Start") or row.get("from") or ""
                  if not start_str:
                      continue
                  try:
                      start_dt = datetime.strptime(start_str[:16], "%Y-%m-%d %H:%M")
                  except ValueError:
                      try:
                          start_dt = datetime.strptime(start_str[:16], "%d/%m/%Y %H:%M")
                      except ValueError:
                          continue
                  night_date = (start_dt - timedelta(hours=12)).date()
                  if night_date not in nights:
                      nights[night_date] = []
                  nights[night_date].append(row)

              # Keep last 7 nights
              recent_nights = sorted(nights.keys())[-7:]
              bucketed_lines = []
              for nd in recent_nights:
                  for row in nights[nd]:
                      bucketed_lines.append(f"Night of {nd}: " + ", ".join(f"{k}={v}" for k, v in row.items()))

              sleep_sample = "\n".join(bucketed_lines) if bucketed_lines else "\n".join(sleep_csv.strip().split("\n")[:55])
              voice_context = full_text[:1500]

              sleep_analysis = claude_call(
                  f"You are Himbo â€” the warm, mischievous, specific voice for Matt's wellness dashboard. "
                  f"Here is context about who Himbo is:\n{voice_context}\n\n"
                  "Write a short response (3â€“4 sentences) about Matt's sleep over the last 7 days. "
                  "Be specific to the actual numbers in the data. "
                  "His sleep context: target bedtime 8:30pm. Interventions he's trying: "
                  "Smiling Mind nightly, magnesium + creatine taken earlier, "
                  "hot shower + cold blast, yin yoga wind-down, lavender oil, screens off early. "
                  "Celebrate wins. Name gaps without moralising. Warm, mischievous, never preachy. "
                  "No emojis. No markdown. No bullet points. Speak directly to him. "
                  "Return only the finished response text â€” no thinking, no preamble, no explanation.",
                  f"Last 7 nights of sleep data (pre-bucketed â€” each row is one full night):\n{sleep_sample}",
                  model="claude-sonnet-4-6",
                  max_tokens=300,
              )
          except FileNotFoundError:
              sleep_analysis = "No sleep data synced yet â€” check back after your next export."
          except Exception as e:
              print(f"Sleep AI error: {e}")
              sleep_analysis = ""

          with open("data/himbo_sleep_ai.json", "w") as f:
              json.dump({"updated_at": datetime.utcnow().isoformat() + "Z", "analysis": sleep_analysis}, f, indent=2)
          print(f"Sleep AI written ({len(sleep_analysis)} chars)")

          # â”€â”€ Â§2: Push Live Data Snapshot to Himbo Notion page â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          print("Pushing live data snapshot to Notion (Â§2)...")
          try:
              snapshot_lines = [f"Last synced: {datetime.utcnow().strftime('%d %b %Y %H:%M')} UTC"]

              # Weight from Withings
              try:
                  with open("data/withings.json") as f:
                      w_data = json.load(f)
                  groups = w_data.get("measures", {}).get("body", {}).get("measuregrps", [])
                  weights = []
                  for g in groups:
                      for m in g.get("measures", []):
                          if m.get("type") == 1:
                              kg = m["value"] * (10 ** m["unit"])
                              weights.append((g.get("date", 0), round(kg, 1)))
                  if weights:
                      weights.sort(key=lambda x: x[0], reverse=True)
                      snapshot_lines.append(f"Weight: {weights[0][1]} kg")
              except Exception as e:
                  print(f"Snapshot weight error: {e}")

              # Activity from Strava
              try:
                  with open("data/strava.json") as f:
                      s_data = json.load(f)
                  acts = s_data.get("activities", [])
                  week_ago = datetime.utcnow() - timedelta(days=7)
                  week_acts = [a for a in acts if datetime.strptime(a["start_date"][:19], "%Y-%m-%dT%H:%M:%S") >= week_ago]
                  if week_acts:
                      snapshot_lines.append(f"Activities this week: {len(week_acts)}")
                      last = week_acts[0]
                      sport = last.get("sport_type") or last.get("type", "")
                      dist = last.get("distance", 0)
                      dist_str = f"{round(dist)}m" if sport == "Swim" else f"{dist/1000:.1f}km"
                      snapshot_lines.append(f"Last: {last['name']} â€” {dist_str}")
              except Exception as e:
                  print(f"Snapshot activity error: {e}")

              # Sleep summary
              if sleep_analysis:
                  snapshot_lines.append(f"Sleep: {sleep_analysis[:120]}{'â€¦' if len(sleep_analysis)>120 else ''}")

              snapshot_text = "\n".join(snapshot_lines)

              # Fetch existing children to find/replace the snapshot callout
              children_r = requests.get(
                  f"https://api.notion.com/v1/blocks/{PAGE_ID}/children?page_size=25",
                  headers=notion_headers
              )
              existing_ids = []
              if children_r.ok:
                  for blk in children_r.json().get("results", []):
                      if blk.get("type") == "callout":
                          icon_emoji = (blk.get("callout",{}).get("icon") or {}).get("emoji","")
                          if icon_emoji == "đź“Š":
                              existing_ids.append(blk["id"])

              # Delete old snapshot callout(s)
              for bid in existing_ids:
                  requests.delete(f"https://api.notion.com/v1/blocks/{bid}", headers=notion_headers)

              # Append new snapshot callout
              requests.patch(
                  f"https://api.notion.com/v1/blocks/{PAGE_ID}/children",
                  headers={**notion_headers, "content-type": "application/json"},
                  json={"children": [{
                      "object": "block",
                      "type": "callout",
                      "callout": {
                          "icon": {"type": "emoji", "emoji": "đź“Š"},
                          "color": "gray_background",
                          "rich_text": [{"type": "text", "text": {"content": snapshot_text}}],
                      },
                  }]},
              )
              print("Notion snapshot pushed.")
          except Exception as e:
              print(f"Notion snapshot error (non-fatal): {e}")
          EOF

      - name: Generate activity summaries
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python - <<'EOF'
          import requests, json, os
          from datetime import datetime, timedelta

          api_key = os.environ["ANTHROPIC_API_KEY"].strip()
          if not api_key:
              raise ValueError("Secret ANTHROPIC_API_KEY is not set")

          with open("data/strava.json") as f:
              strava = json.load(f)
          with open("data/himbo_voice.json") as f:
              voice = json.load(f)

          voice_brief = voice.get("voice_brief", "")
          system_prompt = (voice_brief + "\n\n" if voice_brief else "") + \
              "Write a 4â€“5 sentence summary of this workout for Patroclus. Go beyond describing the numbers â€” interpret them. Was this a hard effort or recovery work? How does the suffer score reflect what his body went through? What does this activity mean in the context of the week's training? Speak directly to him, warm and a little dramatic. No emojis. No markdown."

          cutoff = datetime.utcnow() - timedelta(days=14)
          activities = [
              a for a in strava["activities"]
              if datetime.strptime(a["start_date"][:19], "%Y-%m-%dT%H:%M:%S") >= cutoff
          ]

          summaries = {}
          try:
              with open("data/activity_summaries.json") as f:
                  summaries = json.load(f)
          except FileNotFoundError:
              pass

          for a in activities:
              aid = str(a["id"])
              if aid in summaries:
                  print(f"Skipping {a['name']} (already summarized)")
                  continue

              sport = a.get("sport_type") or a.get("type", "")
              dist = a.get("distance", 0)
              speed = a.get("average_speed", 0)

              if sport == "Swim":
                  dist_str = f"{round(dist)}m"
              else:
                  dist_str = f"{dist / 1000:.1f}km"

              moving = a.get("moving_time", 0)
              h, rem = divmod(moving, 3600)
              m, s = divmod(rem, 60)
              time_str = f"{h}h {m}m" if h else f"{m}m"

              if speed > 0:
                  if sport == "Swim":
                      pace_secs = 100 / speed
                  else:
                      pace_secs = 1000 / speed
                  pace_str = f"{int(pace_secs // 60)}:{int(pace_secs % 60):02d} {'per 100m' if sport == 'Swim' else 'per km'}"
              else:
                  pace_str = None

              lines = [
                  f"Activity: {a['name']}",
                  f"Type: {sport}",
                  f"Date: {a['start_date_local'][:10]}",
                  f"Distance: {dist_str}",
                  f"Moving time: {time_str}",
              ]
              if pace_str:
                  lines.append(f"Average pace: {pace_str}")
              if a.get("average_heartrate"):
                  lines.append(f"Avg heart rate: {round(a['average_heartrate'])} bpm")
              if a.get("max_heartrate"):
                  lines.append(f"Max heart rate: {round(a['max_heartrate'])} bpm")
              if a.get("total_elevation_gain", 0) > 0:
                  lines.append(f"Elevation gain: {round(a['total_elevation_gain'])}m")
              if a.get("suffer_score"):
                  lines.append(f"Suffer score: {a['suffer_score']}")
              if a.get("kudos_count"):
                  lines.append(f"Kudos: {a['kudos_count']}")

              context = "\n".join(lines)

              resp = requests.post(
                  "https://api.anthropic.com/v1/messages",
                  headers={
                      "x-api-key": api_key,
                      "anthropic-version": "2023-06-01",
                      "content-type": "application/json",
                  },
                  json={
                      "model": "claude-sonnet-4-6",
                      "max_tokens": 500,
                      "system": system_prompt,
                      "messages": [{"role": "user", "content": context}],
                  },
                  timeout=30,
              )
              resp.raise_for_status()
              data = resp.json()
              text = data["content"][0]["text"]
              summaries[aid] = text
              print(f"Summarized: {a['name']}")

          with open("data/activity_summaries.json", "w") as f:
              json.dump(summaries, f, indent=2)

          print(f"Done. {len(summaries)} total summaries stored.")

          # â”€â”€ Â§3: Weekly activity + recovery commentary â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
          print("Generating weekly activity commentary (Â§3)...")
          try:
              week_ago = datetime.utcnow() - timedelta(days=7)
              two_weeks_ago = datetime.utcnow() - timedelta(days=14)
              this_week = [a for a in strava["activities"] if datetime.strptime(a["start_date"][:19],"%Y-%m-%dT%H:%M:%S") >= week_ago]
              last_week = [a for a in strava["activities"] if two_weeks_ago <= datetime.strptime(a["start_date"][:19],"%Y-%m-%dT%H:%M:%S") < week_ago]

              def week_summary(acts):
                  if not acts: return "No activities recorded."
                  lines = []
                  for a in acts:
                      sport = a.get("sport_type") or a.get("type","")
                      dist = a.get("distance",0)
                      dist_str = f"{round(dist)}m" if sport=="Swim" else f"{dist/1000:.1f}km"
                      hr = f", avg HR {round(a['average_heartrate'])} bpm" if a.get("average_heartrate") else ""
                      lines.append(f"  {a['start_date_local'][:10]} â€” {a['name']} ({sport}, {dist_str}{hr})")
                  return "\n".join(lines)

              commentary_prompt = (
                  f"This week ({len(this_week)} activities):\n{week_summary(this_week)}\n\n"
                  f"Last week ({len(last_week)} activities):\n{week_summary(last_week)}"
              )

              commentary_resp = requests.post(
                  "https://api.anthropic.com/v1/messages",
                  headers={"x-api-key": api_key, "anthropic-version": "2023-06-01", "content-type": "application/json"},
                  json={
                      "model": "claude-sonnet-4-6",
                      "max_tokens": 350,
                      "system": (
                          (voice_brief[:1200] + "\n\n" if voice_brief else "") +
                          "Write a 3â€“4 sentence week-over-week activity and recovery commentary for Patroclus. "
                          "Compare this week to last week. Celebrate improvement, call out drops, notice patterns. "
                          "Warm, specific, mischievous. No emojis. No markdown. No bullet points. "
                          "Return only the finished commentary text â€” no thinking, no preamble."
                      ),
                      "messages": [{"role": "user", "content": commentary_prompt}],
                  },
                  timeout=40,
              )
              commentary_resp.raise_for_status()
              commentary_text = commentary_resp.json()["content"][0]["text"].strip()
          except Exception as e:
              print(f"Commentary error: {e}")
              commentary_text = ""

          with open("data/himbo_commentary.json", "w") as f:
              json.dump({"updated_at": datetime.utcnow().isoformat()+"Z", "commentary": commentary_text}, f, indent=2)
          print(f"Commentary written ({len(commentary_text)} chars)")
          EOF

      - name: Fetch Hevy gym data
        env:
          HEVY_API_KEY: ${{ secrets.HEVY_API_KEY }}
        run: |
          python - <<'EOF'
          import requests, json, os
          from datetime import datetime, timedelta

          api_key = os.environ["HEVY_API_KEY"].strip()
          if not api_key:
              raise ValueError("HEVY_API_KEY is not set")

          headers = {"api-key": api_key, "accept": "application/json"}
          since = (datetime.utcnow() - timedelta(days=90)).strftime("%Y-%m-%dT00:00:00Z")

          # Paginate workouts
          workouts = []
          page = 1
          while True:
              r = requests.get(
                  "https://api.hevyapp.com/v1/workouts",
                  headers=headers,
                  params={"page": page, "pageSize": 10, "since": since},
                  timeout=30,
              )
              r.raise_for_status()
              data = r.json()
              batch = data.get("workouts", [])
              workouts.extend(batch)
              if len(batch) < 10:
                  break
              page += 1
          print(f"Hevy: fetched {len(workouts)} workouts")

          MUSCLE_MAP = {
              "Bench Press": "Chest", "Incline Bench Press": "Chest", "Cable Fly": "Chest",
              "Overhead Press": "Shoulders", "Lateral Raise": "Shoulders", "Arnold Press": "Shoulders",
              "Pull Up": "Back", "Lat Pulldown": "Back", "Barbell Row": "Back", "Cable Row": "Back",
              "Squat": "Quad", "Leg Press": "Quad", "Hack Squat": "Quad",
              "Romanian Deadlift": "Hinge", "Deadlift": "Hinge",
              "Hip Thrust": "Glutes", "Cable Kickback": "Glutes",
              "Leg Curl": "Hamstrings", "Nordic Curl": "Hamstrings",
              "Bicep Curl": "Biceps", "Hammer Curl": "Biceps", "Preacher Curl": "Biceps",
              "Tricep Pushdown": "Triceps", "Skull Crusher": "Triceps", "Dips": "Triceps",
              "Calf Raise": "Calves",
          }

          def epley(weight_kg, reps):
              return weight_kg * (1 + reps / 30) if reps > 1 else weight_kg

          # Compute best e1RM per muscle per session, then best ever per muscle
          muscle_best = {}
          now = datetime.utcnow()
          week_ago = now - timedelta(days=7)
          sessions_this_week = 0
          recent_workouts = []

          for w in workouts:
              start_str = w.get("start_time") or w.get("created_at", "")
              try:
                  start_dt = datetime.strptime(start_str[:19].replace("T"," "), "%Y-%m-%d %H:%M:%S")
              except:
                  start_dt = None

              if start_dt and start_dt >= week_ago:
                  sessions_this_week += 1

              # Collect exercise names for the recent workout list
              exercise_names = []
              for ex in w.get("exercises", []):
                  ex_title = ex.get("title","")
                  exercise_names.append(ex_title)
                  muscle = next((v for k, v in MUSCLE_MAP.items() if k.lower() in ex_title.lower()), None)
                  if not muscle:
                      continue
                  for s in ex.get("sets", []):
                      if s.get("type") == "warmup":
                          continue
                      wt = s.get("weight_kg") or 0
                      reps = s.get("reps") or 0
                      if wt and reps:
                          e1rm = epley(wt, reps)
                          if muscle not in muscle_best or e1rm > muscle_best[muscle]["e1rm"]:
                              muscle_best[muscle] = {
                                  "e1rm": round(e1rm, 1),
                                  "exercise": ex_title,
                                  "date": start_str[:10],
                              }

              # Recent workouts list (last 5)
              if len(recent_workouts) < 5:
                  duration = None
                  end_str = w.get("end_time","")
                  if start_dt and end_str:
                      try:
                          end_dt = datetime.strptime(end_str[:19].replace("T"," "), "%Y-%m-%d %H:%M:%S")
                          duration = round((end_dt - start_dt).seconds / 60)
                      except:
                          pass
                  recent_workouts.append({
                      "title": w.get("name","Workout"),
                      "date": start_str[:10],
                      "duration_min": duration,
                      "exercises": list(dict.fromkeys(exercise_names)),
                  })

          # Build exercise_history for trend data (last 90 days, best per session per exercise)
          exercise_history = {}
          for w in workouts:
              start_str = w.get("start_time") or w.get("created_at","")
              for ex in w.get("exercises", []):
                  title = ex.get("title","")
                  muscle = next((v for k, v in MUSCLE_MAP.items() if k.lower() in title.lower()), None)
                  if not muscle:
                      continue
                  best_this_session = 0
                  for s in ex.get("sets", []):
                      if s.get("type") == "warmup": continue
                      wt = s.get("weight_kg") or 0
                      reps = s.get("reps") or 0
                      if wt and reps:
                          best_this_session = max(best_this_session, epley(wt, reps))
                  if best_this_session:
                      if title not in exercise_history:
                          exercise_history[title] = []
                      exercise_history[title].append({"date": start_str[:10], "e1rm": round(best_this_session, 1)})

          os.makedirs("data", exist_ok=True)
          with open("data/hevy.json", "w") as f:
              json.dump({
                  "updated_at": datetime.utcnow().isoformat()+"Z",
                  "sessions_this_week": sessions_this_week,
                  "muscle_best": muscle_best,
                  "exercise_history": exercise_history,
                  "recent_workouts": recent_workouts,
              }, f, indent=2)
          print(f"Hevy: wrote {len(muscle_best)} muscle groups, {sessions_this_week} sessions this week")
          EOF

