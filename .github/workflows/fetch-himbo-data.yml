name: Fetch Himbo Data

on:
  workflow_dispatch:

# Triggered via workflow_dispatch only. Two sources:
# 1. cron-job.org — scheduled noon + midnight AEST
# 2. Chorus Boys Sync — manual Home Screen shortcut (iOS)
# No internal GitHub cron schedule — all scheduling handled externally.

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Strava data
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'EOF'
          import requests, json, os, subprocess
          from datetime import datetime, timedelta

          # Refresh access token
          client_id = os.environ["STRAVA_CLIENT_ID"].strip()
          client_secret = os.environ["STRAVA_CLIENT_SECRET"].strip()
          refresh_token = os.environ["STRAVA_REFRESH_TOKEN"].strip()
          for name, val in [("STRAVA_CLIENT_ID", client_id), ("STRAVA_CLIENT_SECRET", client_secret), ("STRAVA_REFRESH_TOKEN", refresh_token)]:
              if not val:
                  raise ValueError(f"Secret {name} is not set")
          r = requests.post("https://www.strava.com/oauth/token", data={
              "client_id": client_id,
              "client_secret": client_secret,
              "refresh_token": refresh_token,
              "grant_type": "refresh_token"
          })
          if not r.ok:
              print(f"Strava token refresh failed {r.status_code}: {r.text}")
              r.raise_for_status()
          token_data = r.json()
          access_token = token_data["access_token"]

          # Strava rotates refresh tokens — update the secret so next run works
          new_refresh = token_data.get("refresh_token", os.environ["STRAVA_REFRESH_TOKEN"])
          if new_refresh != os.environ["STRAVA_REFRESH_TOKEN"]:
              subprocess.run(
                  ["gh", "secret", "set", "STRAVA_REFRESH_TOKEN", "--body", new_refresh,
                   "--repo", os.environ["REPO"]],
                  env={**os.environ, "GH_TOKEN": os.environ["GH_TOKEN"]},
                  check=True
              )
              print("Strava: refresh token rotated and secret updated")

          # Fetch last 14 days of activities
          since = int((datetime.utcnow() - timedelta(days=14)).timestamp())
          activities = requests.get(
              "https://www.strava.com/api/v3/athlete/activities",
              headers={"Authorization": f"Bearer {access_token}"},
              params={"after": since, "per_page": 50}
          )
          activities.raise_for_status()

          os.makedirs("data", exist_ok=True)
          with open("data/strava.json", "w") as f:
              json.dump({
                  "updated_at": datetime.utcnow().isoformat() + "Z",
                  "activities": activities.json()
              }, f, indent=2)

          print(f"Strava: wrote {len(activities.json())} activities")
          EOF

      - name: Fetch Withings data
        env:
          WITHINGS_CLIENT_ID: ${{ secrets.WITHINGS_CLIENT_ID }}
          WITHINGS_CLIENT_SECRET: ${{ secrets.WITHINGS_CLIENT_SECRET }}
          WITHINGS_REFRESH_TOKEN: ${{ secrets.WITHINGS_REFRESH_TOKEN }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'EOF'
          import requests, json, os, subprocess
          from datetime import datetime, timedelta

          # Refresh access token
          r = requests.post("https://wbsapi.withings.net/v2/oauth2", data={
              "action": "requesttoken",
              "client_id": os.environ["WITHINGS_CLIENT_ID"],
              "client_secret": os.environ["WITHINGS_CLIENT_SECRET"],
              "refresh_token": os.environ["WITHINGS_REFRESH_TOKEN"],
              "grant_type": "refresh_token"
          })
          r.raise_for_status()
          token_data = r.json()
          if token_data.get("status") != 0:
              print(f"Withings token refresh error: {json.dumps(token_data)}")
              raise RuntimeError(f"Withings API returned status {token_data.get('status')}: {token_data.get('error', 'unknown error')}")
          body = token_data["body"]
          access_token = body["access_token"]

          # Withings rotates refresh tokens — update the secret so next run works
          new_refresh = body.get("refresh_token", os.environ["WITHINGS_REFRESH_TOKEN"])
          if new_refresh != os.environ["WITHINGS_REFRESH_TOKEN"]:
              subprocess.run(
                  ["gh", "secret", "set", "WITHINGS_REFRESH_TOKEN", "--body", new_refresh,
                   "--repo", os.environ["REPO"]],
                  env={**os.environ, "GH_TOKEN": os.environ["GH_TOKEN"]},
                  check=True
              )
              print("Withings: refresh token rotated and secret updated")

          # Fetch body composition — last 30 days
          # Measure types: 1=weight, 6=fat%, 8=fat mass, 76=muscle mass, 77=hydration
          since = int((datetime.utcnow() - timedelta(days=30)).timestamp())
          measures = requests.post(
              "https://wbsapi.withings.net/measure",
              headers={"Authorization": f"Bearer {access_token}"},
              data={
                  "action": "getmeas",
                  "meastypes": "1,6,76,77",
                  "category": 1,
                  "startdate": since
              }
          )
          measures.raise_for_status()

          os.makedirs("data", exist_ok=True)
          with open("data/withings.json", "w") as f:
              json.dump({
                  "updated_at": datetime.utcnow().isoformat() + "Z",
                  "measures": measures.json()
              }, f, indent=2)

          print("Withings: data written")
          EOF

      - name: Fetch Himbo voice from Notion + generate AI cards
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python - <<'EOF'
          import requests, json, os, time, csv, io, re
          from datetime import datetime, timedelta

          notion_key = os.environ["NOTION_API_KEY"].strip()
          anthropic_key = os.environ["ANTHROPIC_API_KEY"].strip()
          if not notion_key:
              raise ValueError("Secret NOTION_API_KEY is not set")
          if not anthropic_key:
              raise ValueError("Secret ANTHROPIC_API_KEY is not set")

          notion_headers = {
              "Authorization": f"Bearer {notion_key}",
              "Notion-Version": "2022-06-28",
          }

          PAGE_ID = "379db4862bcd81dbbe27d4a8dbb1fa58"
          TEXT_TYPES = {"paragraph", "heading_1", "heading_2", "heading_3",
                        "bulleted_list_item", "numbered_list_item", "quote", "callout", "toggle"}

          def extract_block_text(block):
              bt = block.get("type", "")
              if bt in TEXT_TYPES:
                  rt = block.get(bt, {}).get("rich_text", [])
                  return " ".join(t.get("plain_text", "") for t in rt)
              if bt == "child_database":
                  return block.get("child_database", {}).get("title", "")
              if bt == "child_page":
                  return block.get("child_page", {}).get("title", "")
              return ""

          def fetch_blocks(block_id, depth=0):
              results = []
              cursor = None
              while True:
                  params = "?page_size=100"
                  if cursor:
                      params += f"&start_cursor={cursor}"
                  r = requests.get(
                      f"https://api.notion.com/v1/blocks/{block_id}/children{params}",
                      headers=notion_headers
                  )
                  if not r.ok:
                      print(f"Notion fetch failed for {block_id} depth={depth}: {r.status_code}")
                      break
                  data = r.json()
                  for block in data.get("results", []):
                      bt = block.get("type", "")
                      text = extract_block_text(block)
                      children = []
                      if bt == "child_database" and depth < 3:
                          children = fetch_database_pages(block["id"], depth)
                      elif block.get("has_children") and depth < 5:
                          children = fetch_blocks(block["id"], depth + 1)
                      results.append({"type": bt, "text": text, "children": children})
                  if not data.get("has_more"):
                      break
                  cursor = data.get("next_cursor")
              return results

          def fetch_database_pages(db_id, depth=0):
              r = requests.post(
                  f"https://api.notion.com/v1/databases/{db_id}/query",
                  headers={**notion_headers, "content-type": "application/json"},
                  json={
                      "page_size": 10,
                      "sorts": [{"timestamp": "created_time", "direction": "descending"}],
                  },
                  timeout=30,
              )
              if not r.ok:
                  print(f"DB query failed for {db_id}: {r.status_code} {r.text[:200]}")
                  return []
              pages = r.json().get("results", [])
              results = []
              for page in pages:
                  title = ""
                  for prop in page.get("properties", {}).values():
                      if prop.get("type") == "title":
                          title = " ".join(t.get("plain_text", "") for t in prop.get("title", []))
                          break
                  if not title:
                      title = page.get("id", "")[:8]
                  children = fetch_blocks(page["id"], depth + 1) if depth < 3 else []
                  results.append({"type": "heading_2", "text": title, "children": children})
              return results

          def flatten_blocks(blocks, indent=0):
              lines = []
              prefix = "  " * indent
              for b in blocks:
                  if b["text"]:
                      lines.append(prefix + b["text"])
                  if b.get("children"):
                      lines.extend(flatten_blocks(b["children"], indent + 1))
              return lines

          print("Fetching Notion page...")
          blocks = fetch_blocks(PAGE_ID)
          full_text = "\n".join(flatten_blocks(blocks))

          os.makedirs("data", exist_ok=True)
          with open("data/himbo_voice.json", "w") as f:
              json.dump({"voice_brief": full_text}, f, indent=2)
          print(f"Notion: voice brief written ({len(full_text)} chars)")

          def claude_call(system, user, model="claude-haiku-4-5-20251001", max_tokens=1000):
              r = requests.post(
                  "https://api.anthropic.com/v1/messages",
                  headers={
                      "x-api-key": anthropic_key,
                      "anthropic-version": "2023-06-01",
                      "content-type": "application/json",
                  },
                  json={
                      "model": model,
                      "max_tokens": max_tokens,
                      "system": system,
                      "messages": [{"role": "user", "content": user}],
                  },
                  timeout=60,
              )
              r.raise_for_status()
              # Filter to text-type blocks only — guards against any thinking-block leakage
              text_blocks = [b["text"] for b in r.json()["content"] if b.get("type") == "text"]
              return "".join(text_blocks).strip()

          def strip_fences(raw):
              t = raw.strip()
              if t.startswith("```"):
                  t = "\n".join(t.split("\n")[1:])
                  t = t.rsplit("```", 1)[0]
              return t.strip()

          print("Querying Service Compendium challenges (§6)...")
          CHALLENGES_DB_ID = "1345c915-686b-4efd-939c-363c53c5315d"
          challenges_payload = {
              "filter": {
                  "and": [
                      {"property": "God", "select": {"equals": "Himbo"}},
                      {"property": "Status", "select": {"equals": "Active"}},
                  ]
              },
              "sorts": [{"property": "Status", "direction": "ascending"}],
              "page_size": 50,
          }
          ch_r = requests.post(
              f"https://api.notion.com/v1/databases/{CHALLENGES_DB_ID}/query",
              headers={**notion_headers, "content-type": "application/json"},
              json=challenges_payload,
              timeout=30,
          )
          ch_r.raise_for_status()
          ch_pages = ch_r.json().get("results", [])

          def prop_text(page, name):
              p = page.get("properties", {}).get(name, {})
              pt = p.get("type", "")
              if pt == "title":   return " ".join(t.get("plain_text","") for t in p.get("title",[]))
              if pt == "rich_text": return " ".join(t.get("plain_text","") for t in p.get("rich_text",[]))
              if pt == "select":  return (p.get("select") or {}).get("name", "")
              if pt == "date":    return (p.get("date") or {}).get("start", "")
              if pt == "number":  return p.get("number")
              return ""

          challenges_list = []
          grace_total = 0
          for pg in ch_pages:
              grace_val = prop_text(pg, "Grace Earned")
              if grace_val:
                  try: grace_total += float(grace_val)
                  except: pass
              challenges_list.append({
                  "service":            prop_text(pg, "Service"),
                  "tier":               prop_text(pg, "Tier"),
                  "mystery":            prop_text(pg, "Mystery"),
                  "status":             prop_text(pg, "Status"),
                  "cadence":            prop_text(pg, "Cadence"),
                  "due_date":           prop_text(pg, "Due Date"),
                  "trigger_condition":  prop_text(pg, "Trigger Condition"),
                  "favour_value":       prop_text(pg, "Favour Value"),
                  "grace_earned":       prop_text(pg, "Grace Earned"),
              })

          # Also sum grace from Completed services for the jewellery section
          grace_r = requests.post(
              f"https://api.notion.com/v1/databases/{CHALLENGES_DB_ID}/query",
              headers={**notion_headers, "content-type": "application/json"},
              json={
                  "filter": {"and": [
                      {"property": "God", "select": {"equals": "Himbo"}},
                      {"property": "Status", "select": {"equals": "Complete"}},
                  ]},
                  "page_size": 100,
              },
              timeout=30,
          )
          if grace_r.ok:
              for pg in grace_r.json().get("results", []):
                  gv = prop_text(pg, "Grace Earned")
                  if gv:
                      try: grace_total += float(gv)
                      except: pass

          with open("data/himbo_trials.json", "w") as f:
              json.dump({
                  "updated_at": datetime.utcnow().isoformat() + "Z",
                  "trials": challenges_list,
                  "grace_total": grace_total,
              }, f, indent=2)
          print(f"Trials: {len(challenges_list)} active, grace_total={grace_total}")

          print("Generating Joy Police card...")
          # Extract all dated Saturday entries, parse dates, sort, take most recent 2
          MONTHS = {"january":1,"february":2,"march":3,"april":4,"may":5,"june":6,
                    "july":7,"august":8,"september":9,"october":10,"november":11,"december":12}
          raw_blocks = re.findall(
              r'(Saturday\s+\d+\s+\w+\s+\d{4}.*?)(?=Saturday\s+\d+\s+\w+\s+\d{4}|$)',
              full_text, re.DOTALL | re.IGNORECASE
          )
          def parse_sat_date(block):
              m = re.match(r'Saturday\s+(\d+)\s+(\w+)\s+(\d{4})', block.strip(), re.IGNORECASE)
              if not m: return datetime.min
              mon = MONTHS.get(m.group(2).lower(), 0)
              return datetime(int(m.group(3)), mon, int(m.group(1))) if mon else datetime.min
          dated = sorted(raw_blocks, key=parse_sat_date)
          recent_entries = "\n\n---\n\n".join(b.strip() for b in dated[-2:])[:3000] if dated else ""

          if recent_entries:
              voice_context = full_text[:1500]
              # Find the current Internal Work mystery from Service Compendium
              internal_challenge = next(
                  (ch["service"] for ch in challenges_list if ch.get("mystery","").lower() == "internal work" and ch.get("status") == "Active"),
                  next((ch["service"] for ch in challenges_list if ch.get("status") == "Active"), "none")
              )

              raw_joy = claude_call(
                  f"You are Himbo. Here is your character context:\n{voice_context}\n\n"
                  "Write a Joy Police breakdown based on the last 2 Saturday reflection log entries. "
                  "Return ONLY valid JSON with exactly these three fields:\n"
                  '{"rounds": "...", "pattern": "...", "focus": "..."}\n\n'
                  '"rounds": Specific wins and losses from this week. Named and concrete — '
                  'call out the actual moments. e.g. "Poncho stayed on at Balmoral — they got that one. '
                  'But the black bag to Lavendra? You got that one." 2-4 sentences.\n'
                  '"pattern": ONE line on what the joy police are currently doing overall. '
                  'e.g. "They\'re loud in front of your people, quiet with strangers."\n'
                  f'"focus": State this week\'s Internal Work challenge directly: "{internal_challenge}"\n\n'
                  "Himbo voice: warm, mischievous, specific, never preachy.",
                  f"Last 2 Saturday reflection log entries:\n\n{recent_entries}",
                  model="claude-sonnet-4-6",
                  max_tokens=400,
              )
              try:
                  joy_data = json.loads(strip_fences(raw_joy))
              except Exception as e:
                  print(f"Joy parse error: {e}\nRaw: {raw_joy[:300]}")
                  joy_data = {"rounds": raw_joy, "pattern": "", "focus": internal_challenge}
          else:
              print("No Saturday reflection entries found in page content yet.")
              internal_challenge = next(
                  (ch["service"] for ch in challenges_list if ch.get("mystery","").lower() == "internal work" and ch.get("status") == "Active"),
                  "none"
              )
              joy_data = {
                  "rounds": "",
                  "pattern": "",
                  "focus": internal_challenge,
              }

          with open("data/himbo_joy.json", "w") as f:
              json.dump({"updated_at": datetime.utcnow().isoformat() + "Z", **joy_data}, f, indent=2)
          print(f"Joy Police written: rounds={len(joy_data.get('rounds',''))} chars")

          print("Generating sleep AI card (§4 — pre-bucketed by night)...")
          sleep_analysis = ""
          try:
              with open("data/sleep.json") as f:
                  sleep_csv = f.read()

              # Mirror the dashboard's nightLabel logic exactly:
              # segments starting before noon belong to the previous calendar day's night.
              def sleep_night_of(start_dt):
                  if start_dt.hour < 12:
                      return (start_dt - timedelta(days=1)).date()
                  else:
                      return start_dt.date()

              def parse_sleep_dt(s):
                  s = s.strip()
                  for fmt in (
                      "%d %b %Y at %I:%M %p",   # "20 Jun 2026 at 12:05 am"
                      "%d %b %Y at %I:%M%p",     # without space before am/pm
                      "%Y-%m-%d %H:%M",
                      "%d/%m/%Y %H:%M",
                      "%Y-%m-%dT%H:%M",
                  ):
                      try:
                          return datetime.strptime(s, fmt)
                      except ValueError:
                          continue
                  for fmt in ("%Y-%m-%d %H:%M", "%Y-%m-%dT%H:%M"):
                      try:
                          return datetime.strptime(s[:16], fmt)
                      except ValueError:
                          continue
                  return None

              # Mirror parseDurSecs: "h:mm:ss", "mm:ss", or raw seconds string
              def parse_dur_secs(s):
                  if not s:
                      return 0
                  parts = s.split(":")
                  try:
                      if len(parts) == 1: return int(parts[0])
                      if len(parts) == 2: return int(parts[0]) * 60 + int(parts[1])
                      return int(parts[0]) * 3600 + int(parts[1]) * 60 + int(parts[2])
                  except (ValueError, IndexError):
                      return 0

              SLEEP_STAGES = {"Core", "Deep", "REM", "Asleep"}  # Awake excluded from total, same as dashboard

              reader = csv.DictReader(io.StringIO(sleep_csv))
              nights = {}
              for row in reader:
                  start_str = row.get("start", "").strip()
                  dur_str   = row.get("duration", "").strip()
                  stage     = row.get("stage", "").strip()
                  if not start_str:
                      continue
                  start_dt = parse_sleep_dt(start_str)
                  if not start_dt:
                      continue
                  nd = sleep_night_of(start_dt)
                  if nd not in nights:
                      nights[nd] = {"sleep_secs": 0, "stages": {}}
                  secs = parse_dur_secs(dur_str)
                  # Total sleep excludes Awake, matching the dashboard formula
                  if stage in SLEEP_STAGES:
                      nights[nd]["sleep_secs"] += secs
                  if stage:
                      nights[nd]["stages"][stage] = nights[nd]["stages"].get(stage, 0) + secs

              # Last 7 nights sorted oldest → newest, matching the dashboard's slice
              recent_nights = sorted(nights.keys())[-7:]
              bucketed_summary = []
              for nd in recent_nights:
                  n = nights[nd]
                  total_secs = n["sleep_secs"]
                  total_h = total_secs // 3600
                  total_m = (total_secs % 3600) // 60
                  stage_parts = [
                      f"{s} {n['stages'][s]//3600}h{(n['stages'][s]%3600)//60}m"
                      for s in ("Deep", "REM", "Core", "Awake")
                      if n["stages"].get(s, 0) > 0
                  ]
                  stage_str = " | ".join(stage_parts) if stage_parts else ""
                  line = f"Night of {nd}: {total_h}h {total_m}m sleep"
                  if stage_str:
                      line += f" ({stage_str})"
                  bucketed_summary.append(line)

              sleep_sample = "\n".join(bucketed_summary) if bucketed_summary else "\n".join(sleep_csv.strip().split("\n")[:15])
              print(f"Sleep: bucketed {len(bucketed_summary)} nights")
              voice_context = full_text[:1500]

              sleep_analysis = claude_call(
                  f"You are Himbo — the warm, mischievous, specific voice for Matt's wellness dashboard. "
                  f"Here is context about who Himbo is:\n{voice_context}\n\n"
                  "Output only the finished assessment paragraph. "
                  "Do not show your reasoning process, do not narrate how you are interpreting or organising the data, "
                  "do not use phrases like 'let me work through this' or 'let me re-examine.' "
                  "The data you are given is already correctly grouped by night — do not re-derive or question the grouping. "
                  "Write the final summary directly.\n\n"
                  "Write a short response (3–4 sentences) about Matt's sleep over the last 7 nights. "
                  "Be specific to the actual numbers in the data. "
                  "His sleep context: target bedtime 8:30pm. Interventions he's trying: "
                  "Smiling Mind nightly, magnesium + creatine taken earlier, "
                  "hot shower + cold blast, yin yoga wind-down, lavender oil, screens off early. "
                  "Celebrate wins. Name gaps without moralising. Warm, mischievous, never preachy. "
                  "No emojis. No markdown. No bullet points. Speak directly to him.",
                  f"Last 7 nights of sleep (pre-bucketed totals — each line is one full night):\n{sleep_sample}",
                  model="claude-sonnet-4-6",
                  max_tokens=300,
              )
          except FileNotFoundError:
              sleep_analysis = "No sleep data synced yet — check back after your next export."
          except Exception as e:
              print(f"Sleep AI error: {e}")
              sleep_analysis = ""

          with open("data/himbo_sleep_ai.json", "w") as f:
              json.dump({"updated_at": datetime.utcnow().isoformat() + "Z", "analysis": sleep_analysis}, f, indent=2)
          print(f"Sleep AI written ({len(sleep_analysis)} chars)")

          # ── §2: Push Live Data Snapshot to Himbo Notion page ──────────────
          print("Pushing live data snapshot to Notion (§2)...")
          try:
              snapshot_lines = [f"Last synced: {datetime.utcnow().strftime('%d %b %Y %H:%M')} UTC"]

              # Weight from Withings
              try:
                  with open("data/withings.json") as f:
                      w_data = json.load(f)
                  groups = w_data.get("measures", {}).get("body", {}).get("measuregrps", [])
                  weights = []
                  for g in groups:
                      for m in g.get("measures", []):
                          if m.get("type") == 1:
                              kg = m["value"] * (10 ** m["unit"])
                              weights.append((g.get("date", 0), round(kg, 1)))
                  if weights:
                      weights.sort(key=lambda x: x[0], reverse=True)
                      snapshot_lines.append(f"Weight: {weights[0][1]} kg")
              except Exception as e:
                  print(f"Snapshot weight error: {e}")

              # Activity from Strava
              try:
                  with open("data/strava.json") as f:
                      s_data = json.load(f)
                  acts = s_data.get("activities", [])
                  week_ago = datetime.utcnow() - timedelta(days=7)
                  week_acts = [a for a in acts if datetime.strptime(a["start_date"][:19], "%Y-%m-%dT%H:%M:%S") >= week_ago]
                  if week_acts:
                      snapshot_lines.append(f"Activities this week: {len(week_acts)}")
                      last = week_acts[0]
                      sport = last.get("sport_type") or last.get("type", "")
                      dist = last.get("distance", 0)
                      dist_str = f"{round(dist)}m" if sport == "Swim" else f"{dist/1000:.1f}km"
                      snapshot_lines.append(f"Last: {last['name']} — {dist_str}")
              except Exception as e:
                  print(f"Snapshot activity error: {e}")

              # Sleep summary
              if sleep_analysis:
                  snapshot_lines.append(f"Sleep: {sleep_analysis[:120]}{'…' if len(sleep_analysis)>120 else ''}")

              snapshot_text = "\n".join(snapshot_lines)

              # Paginate all children to find every existing snapshot callout
              existing_ids = []
              snap_cursor = None
              while True:
                  params = "?page_size=100"
                  if snap_cursor:
                      params += f"&start_cursor={snap_cursor}"
                  children_r = requests.get(
                      f"https://api.notion.com/v1/blocks/{PAGE_ID}/children{params}",
                      headers=notion_headers
                  )
                  if not children_r.ok:
                      break
                  snap_data = children_r.json()
                  for blk in snap_data.get("results", []):
                      if blk.get("type") == "callout":
                          icon_emoji = (blk.get("callout",{}).get("icon") or {}).get("emoji","")
                          if icon_emoji == "📊":
                              existing_ids.append(blk["id"])
                  if not snap_data.get("has_more"):
                      break
                  snap_cursor = snap_data.get("next_cursor")

              # Delete old snapshot callout(s)
              for bid in existing_ids:
                  requests.delete(f"https://api.notion.com/v1/blocks/{bid}", headers=notion_headers)

              # Append new snapshot callout
              requests.patch(
                  f"https://api.notion.com/v1/blocks/{PAGE_ID}/children",
                  headers={**notion_headers, "content-type": "application/json"},
                  json={"children": [{
                      "object": "block",
                      "type": "callout",
                      "callout": {
                          "icon": {"type": "emoji", "emoji": "📊"},
                          "color": "gray_background",
                          "rich_text": [{"type": "text", "text": {"content": snapshot_text}}],
                      },
                  }]},
              )
              print("Notion snapshot pushed.")
          except Exception as e:
              print(f"Notion snapshot error (non-fatal): {e}")
          EOF

      - name: Fetch check-in completion from Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          python - <<'EOF'
          import requests, json, os
          from datetime import datetime, timedelta, timezone

          notion_key = os.environ["NOTION_API_KEY"].strip()
          DB_ID = "79579bf4d6ea49f692e793e8773b1811"

          AEST = timezone(timedelta(hours=10))
          now_aest = datetime.now(AEST)

          # Sunday–Saturday week boundary in AEST
          # weekday(): Mon=0 ... Sun=6  →  days since Sunday = (weekday+1) % 7
          days_since_sunday = (now_aest.weekday() + 1) % 7
          week_start_aest = (now_aest - timedelta(days=days_since_sunday)).replace(hour=0, minute=0, second=0, microsecond=0)
          week_end_aest   = week_start_aest + timedelta(days=6, hours=23, minutes=59, seconds=59)

          week_start_iso = week_start_aest.strftime("%Y-%m-%d")
          week_end_iso   = week_end_aest.strftime("%Y-%m-%d")
          print(f"Check-ins: week {week_start_iso} → {week_end_iso} AEST")

          headers = {
              "Authorization": f"Bearer {notion_key}",
              "Notion-Version": "2022-06-28",
              "content-type": "application/json",
          }

          def prop_text(page, name):
              p = page.get("properties", {}).get(name, {})
              pt = p.get("type", "")
              if pt == "title":     return " ".join(t.get("plain_text","") for t in p.get("title",[]))
              if pt == "rich_text": return " ".join(t.get("plain_text","") for t in p.get("rich_text",[]))
              if pt == "select":    return (p.get("select") or {}).get("name","")
              if pt == "date":      return (p.get("date") or {}).get("start","")
              return ""

          saturday_complete = False
          wednesday_complete = False
          last_saturday = None
          last_wednesday = None
          error_flag = False

          try:
              # Query this week's entries
              r = requests.post(
                  f"https://api.notion.com/v1/databases/{DB_ID}/query",
                  headers=headers,
                  json={
                      "filter": {
                          "and": [
                              {"property": "Date", "date": {"on_or_after":  week_start_iso}},
                              {"property": "Date", "date": {"on_or_before": week_end_iso}},
                          ]
                      },
                      "page_size": 50,
                  },
                  timeout=30,
              )
              r.raise_for_status()
              for page in r.json().get("results", []):
                  entry_type = prop_text(page, "Type")
                  entry_date = prop_text(page, "Date")
                  if entry_type == "Saturday Full Check-In":
                      saturday_complete = True
                      if entry_date and (not last_saturday or entry_date > last_saturday):
                          last_saturday = entry_date
                  elif entry_type == "Wednesday Midweek Pulse":
                      wednesday_complete = True
                      if entry_date and (not last_wednesday or entry_date > last_wednesday):
                          last_wednesday = entry_date

              # Also fetch most recent of each type regardless of week (for "Last:" subtext)
              for entry_type_filter, target in [
                  ("Saturday Full Check-In",  "saturday"),
                  ("Wednesday Midweek Pulse", "wednesday"),
              ]:
                  rr = requests.post(
                      f"https://api.notion.com/v1/databases/{DB_ID}/query",
                      headers=headers,
                      json={
                          "filter": {"property": "Type", "select": {"equals": entry_type_filter}},
                          "sorts": [{"property": "Date", "direction": "descending"}],
                          "page_size": 1,
                      },
                      timeout=30,
                  )
                  if rr.ok:
                      results = rr.json().get("results", [])
                      if results:
                          d = prop_text(results[0], "Date")
                          if target == "saturday"  and not last_saturday:  last_saturday  = d
                          if target == "wednesday" and not last_wednesday: last_wednesday = d

              print(f"Saturday complete: {saturday_complete}, Wednesday complete: {wednesday_complete}")

          except Exception as e:
              print(f"Check-in fetch error: {e}")
              error_flag = True

          os.makedirs("data", exist_ok=True)
          with open("data/himbo_checkins.json", "w") as f:
              json.dump({
                  "updated_at": datetime.utcnow().isoformat() + "Z",
                  "week_start": week_start_iso,
                  "week_end":   week_end_iso,
                  "saturday_checkin_complete":  saturday_complete,
                  "wednesday_pulse_complete":   wednesday_complete,
                  "last_saturday_checkin":  last_saturday,
                  "last_wednesday_pulse":   last_wednesday,
                  "error": error_flag,
              }, f, indent=2)
          print("Check-ins written.")
          EOF

      - name: Generate activity summaries
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python - <<'EOF'
          import requests, json, os
          from datetime import datetime, timedelta

          api_key = os.environ["ANTHROPIC_API_KEY"].strip()
          if not api_key:
              raise ValueError("Secret ANTHROPIC_API_KEY is not set")

          with open("data/strava.json") as f:
              strava = json.load(f)
          with open("data/himbo_voice.json") as f:
              voice = json.load(f)

          voice_brief = voice.get("voice_brief", "")
          system_prompt = (voice_brief + "\n\n" if voice_brief else "") + \
              "Write a 4–5 sentence summary of this workout for Patroclus. Go beyond describing the numbers — interpret them. Was this a hard effort or recovery work? How does the suffer score reflect what his body went through? What does this activity mean in the context of the week's training? Speak directly to him, warm and a little dramatic. No emojis. No markdown."

          cutoff = datetime.utcnow() - timedelta(days=14)
          activities = [
              a for a in strava["activities"]
              if datetime.strptime(a["start_date"][:19], "%Y-%m-%dT%H:%M:%S") >= cutoff
          ]

          summaries = {}
          try:
              with open("data/activity_summaries.json") as f:
                  summaries = json.load(f)
          except FileNotFoundError:
              pass

          for a in activities:
              aid = str(a["id"])
              if aid in summaries:
                  print(f"Skipping {a['name']} (already summarized)")
                  continue

              sport = a.get("sport_type") or a.get("type", "")
              dist = a.get("distance", 0)
              speed = a.get("average_speed", 0)

              if sport == "Swim":
                  dist_str = f"{round(dist)}m"
              else:
                  dist_str = f"{dist / 1000:.1f}km"

              moving = a.get("moving_time", 0)
              h, rem = divmod(moving, 3600)
              m, s = divmod(rem, 60)
              time_str = f"{h}h {m}m" if h else f"{m}m"

              if speed > 0:
                  if sport == "Swim":
                      pace_secs = 100 / speed
                  else:
                      pace_secs = 1000 / speed
                  pace_str = f"{int(pace_secs // 60)}:{int(pace_secs % 60):02d} {'per 100m' if sport == 'Swim' else 'per km'}"
              else:
                  pace_str = None

              lines = [
                  f"Activity: {a['name']}",
                  f"Type: {sport}",
                  f"Date: {a['start_date_local'][:10]}",
                  f"Distance: {dist_str}",
                  f"Moving time: {time_str}",
              ]
              if pace_str:
                  lines.append(f"Average pace: {pace_str}")
              if a.get("average_heartrate"):
                  lines.append(f"Avg heart rate: {round(a['average_heartrate'])} bpm")
              if a.get("max_heartrate"):
                  lines.append(f"Max heart rate: {round(a['max_heartrate'])} bpm")
              if a.get("total_elevation_gain", 0) > 0:
                  lines.append(f"Elevation gain: {round(a['total_elevation_gain'])}m")
              if a.get("suffer_score"):
                  lines.append(f"Suffer score: {a['suffer_score']}")
              if a.get("kudos_count"):
                  lines.append(f"Kudos: {a['kudos_count']}")

              context = "\n".join(lines)

              resp = requests.post(
                  "https://api.anthropic.com/v1/messages",
                  headers={
                      "x-api-key": api_key,
                      "anthropic-version": "2023-06-01",
                      "content-type": "application/json",
                  },
                  json={
                      "model": "claude-sonnet-4-6",
                      "max_tokens": 500,
                      "system": system_prompt,
                      "messages": [{"role": "user", "content": context}],
                  },
                  timeout=30,
              )
              resp.raise_for_status()
              data = resp.json()
              text = data["content"][0]["text"]
              summaries[aid] = text
              print(f"Summarized: {a['name']}")

          with open("data/activity_summaries.json", "w") as f:
              json.dump(summaries, f, indent=2)

          print(f"Done. {len(summaries)} total summaries stored.")

          # ── §3: Weekly activity + recovery commentary ──────────────────────
          print("Generating weekly activity commentary (§3)...")
          try:
              week_ago = datetime.utcnow() - timedelta(days=7)
              two_weeks_ago = datetime.utcnow() - timedelta(days=14)
              this_week = [a for a in strava["activities"] if datetime.strptime(a["start_date"][:19],"%Y-%m-%dT%H:%M:%S") >= week_ago]
              last_week = [a for a in strava["activities"] if two_weeks_ago <= datetime.strptime(a["start_date"][:19],"%Y-%m-%dT%H:%M:%S") < week_ago]

              def week_summary(acts):
                  if not acts: return "No activities recorded."
                  lines = []
                  for a in acts:
                      sport = a.get("sport_type") or a.get("type","")
                      dist = a.get("distance",0)
                      dist_str = f"{round(dist)}m" if sport=="Swim" else f"{dist/1000:.1f}km"
                      hr = f", avg HR {round(a['average_heartrate'])} bpm" if a.get("average_heartrate") else ""
                      # Format weekday explicitly so the model doesn't compute it from the year
                      try:
                          local_dt = datetime.strptime(a["start_date_local"][:10], "%Y-%m-%d")
                          day_str = local_dt.strftime("%a %d %b %Y")  # e.g. "Fri 26 Jun 2026"
                      except Exception:
                          day_str = a["start_date_local"][:10]
                      lines.append(f"  {day_str} — {a['name']} ({sport}, {dist_str}{hr})")
                  return "\n".join(lines)

              commentary_prompt = (
                  f"This week ({len(this_week)} activities):\n{week_summary(this_week)}\n\n"
                  f"Last week ({len(last_week)} activities):\n{week_summary(last_week)}"
              )

              commentary_resp = requests.post(
                  "https://api.anthropic.com/v1/messages",
                  headers={"x-api-key": api_key, "anthropic-version": "2023-06-01", "content-type": "application/json"},
                  json={
                      "model": "claude-sonnet-4-6",
                      "max_tokens": 350,
                      "system": (
                          (voice_brief[:1200] + "\n\n" if voice_brief else "") +
                          "Write a 3–4 sentence week-over-week activity and recovery commentary for Patroclus. "
                          "Compare this week to last week. Celebrate improvement, call out drops, notice patterns. "
                          "Warm, specific, mischievous. No emojis. No markdown. No bullet points. "
                          "Return only the finished commentary text — no thinking, no preamble."
                      ),
                      "messages": [{"role": "user", "content": commentary_prompt}],
                  },
                  timeout=40,
              )
              commentary_resp.raise_for_status()
              text_blocks = [b["text"] for b in commentary_resp.json()["content"] if b.get("type") == "text"]
              commentary_text = "".join(text_blocks).strip()
          except Exception as e:
              print(f"Commentary error: {e}")
              commentary_text = ""

          # ── §7: Metrics commentary (run/walk, swim, energy, HRV, VO2) ─────
          print("Generating metrics commentary (§7)...")
          metrics_commentary = ""
          try:
              week_ago2 = datetime.utcnow() - timedelta(days=7)
              week_acts = [a for a in strava["activities"]
                           if datetime.strptime(a["start_date"][:19], "%Y-%m-%dT%H:%M:%S") >= week_ago2]

              run_km  = sum(a["distance"] / 1000 for a in week_acts if a.get("sport_type") in ("Run","Walk","TrailRun","Hike"))
              swim_m  = sum(a["distance"] for a in week_acts if a.get("sport_type") == "Swim")
              active_kj = sum(a.get("kilojoules", 0) for a in week_acts)

              metrics_lines = [f"Run/walk this week: {run_km:.1f} km across {sum(1 for a in week_acts if a.get('sport_type') in ('Run','Walk','TrailRun','Hike'))} sessions."]
              if swim_m > 0:
                  metrics_lines.append(f"Swim: {round(swim_m)} m total.")
              if active_kj > 0:
                  metrics_lines.append(f"Active energy (Strava): {round(active_kj)} kJ.")

              # Try to read HRV and VO2 from activity.json if available
              try:
                  import csv as csv_mod, io as io_mod
                  with open("data/activity.json") as f:
                      act_csv = f.read()
                  act_reader = csv_mod.DictReader(io_mod.StringIO(act_csv))
                  hrv_vals, vo2_vals = [], []
                  for row in act_reader:
                      t = row.get("type","")
                      if t in ("Heart Rate Variability","HRV","HeartRateVariability"):
                          try: hrv_vals.append(float(row.get("value","")))
                          except: pass
                      if t in ("VO2 Max","VO2Max","Cardio Fitness","CardioFitness"):
                          try: vo2_vals.append(float(row.get("value","")))
                          except: pass
                  if hrv_vals:
                      metrics_lines.append(f"HRV latest: {round(hrv_vals[0])} ms, 7d avg: {round(sum(hrv_vals[:7])/min(len(hrv_vals),7))} ms.")
                  if vo2_vals:
                      metrics_lines.append(f"VO2 Max: {vo2_vals[0]:.1f} mL/kg/min.")
              except Exception as e:
                  print(f"activity.json read (non-fatal): {e}")

              metrics_prompt = "\n".join(metrics_lines)
              metrics_resp = requests.post(
                  "https://api.anthropic.com/v1/messages",
                  headers={"x-api-key": api_key, "anthropic-version": "2023-06-01", "content-type": "application/json"},
                  json={
                      "model": "claude-sonnet-4-6",
                      "max_tokens": 400,
                      "system": (
                          (voice_brief[:1200] + "\n\n" if voice_brief else "") +
                          "Write a 3–4 sentence commentary on Matt's fitness metrics this week — "
                          "run/walk, swim, energy output, HRV, and VO2 Max. "
                          "Be specific to the numbers. Celebrate what's strong, name what needs attention. "
                          "Warm, mischievous, never preachy. No emojis. No markdown. No bullet points. "
                          "Return only the finished text."
                      ),
                      "messages": [{"role": "user", "content": metrics_prompt}],
                  },
                  timeout=40,
              )
              metrics_resp.raise_for_status()
              text_blocks = [b["text"] for b in metrics_resp.json()["content"] if b.get("type") == "text"]
              metrics_commentary = "".join(text_blocks).strip()
          except Exception as e:
              print(f"Metrics commentary error: {e}")
              metrics_commentary = ""

          with open("data/himbo_commentary.json", "w") as f:
              json.dump({
                  "updated_at": datetime.utcnow().isoformat()+"Z",
                  "commentary": commentary_text,
                  "metrics_commentary": metrics_commentary,
              }, f, indent=2)
          print(f"Commentary written ({len(commentary_text)} chars), metrics ({len(metrics_commentary)} chars)")
          EOF

      - name: Fetch Hevy gym data
        env:
          HEVY_API_KEY: ${{ secrets.HEVY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python - <<'EOF'
          import requests, json, os
          from datetime import datetime, timedelta

          api_key = os.environ["HEVY_API_KEY"].strip()
          if not api_key:
              raise ValueError("HEVY_API_KEY is not set")

          headers = {"api-key": api_key, "accept": "application/json"}
          since = (datetime.utcnow() - timedelta(days=90)).strftime("%Y-%m-%dT00:00:00Z")

          # Paginate workouts
          workouts = []
          page = 1
          while True:
              r = requests.get(
                  "https://api.hevyapp.com/v1/workouts",
                  headers=headers,
                  params={"page": page, "pageSize": 10, "since": since},
                  timeout=30,
              )
              r.raise_for_status()
              data = r.json()
              batch = data.get("workouts", [])
              workouts.extend(batch)
              if len(batch) < 10:
                  break
              page += 1
          print(f"Hevy: fetched {len(workouts)} workouts")

          MUSCLE_MAP = {
              "Bench Press": "Chest", "Incline Bench Press": "Chest", "Cable Fly": "Chest",
              "Overhead Press": "Shoulders", "Lateral Raise": "Shoulders", "Arnold Press": "Shoulders",
              "Pull Up": "Back", "Lat Pulldown": "Back", "Barbell Row": "Back", "Cable Row": "Back",
              "Squat": "Quad", "Leg Press": "Quad", "Hack Squat": "Quad",
              "Romanian Deadlift": "Hinge", "Deadlift": "Hinge",
              "Hip Thrust": "Glutes", "Cable Kickback": "Glutes",
              "Leg Curl": "Hamstrings", "Nordic Curl": "Hamstrings",
              "Bicep Curl": "Biceps", "Hammer Curl": "Biceps", "Preacher Curl": "Biceps",
              "Tricep Pushdown": "Triceps", "Skull Crusher": "Triceps", "Dips": "Triceps",
              "Calf Raise": "Calves",
          }

          def epley(weight_kg, reps):
              return weight_kg * (1 + reps / 30) if reps > 1 else weight_kg

          def workout_duration_min(w):
              s = w.get("start_time") or w.get("created_at","")
              e = w.get("end_time","")
              if not s or not e: return None
              try:
                  sd = datetime.strptime(s[:19].replace("T"," "), "%Y-%m-%d %H:%M:%S")
                  ed = datetime.strptime(e[:19].replace("T"," "), "%Y-%m-%d %H:%M:%S")
                  return round((ed - sd).total_seconds() / 60)
              except: return None

          BASELINE_DATE = datetime(2026, 5, 18)
          now = datetime.utcnow()
          week_ago = now - timedelta(days=7)

          muscle_best = {}
          muscle_history = {}   # {muscle: [{date, e1rm}]}
          exercise_all_time = {}  # {exercise: best_e1rm_ever_before_today}
          weekly_volume = {}    # {week_start_iso: total_kg_lifted}
          prs = []
          sessions_this_week = 0
          recent_workouts = []

          # Sort workouts chronologically for PR detection
          def workout_dt(w):
              s = w.get("start_time") or w.get("created_at","")
              try: return datetime.strptime(s[:19].replace("T"," "), "%Y-%m-%d %H:%M:%S")
              except: return datetime.min
          workouts_sorted = sorted(workouts, key=workout_dt)

          for w in workouts_sorted:
              start_str = w.get("start_time") or w.get("created_at","")
              try:
                  start_dt = datetime.strptime(start_str[:19].replace("T"," "), "%Y-%m-%d %H:%M:%S")
              except:
                  start_dt = None

              dur = workout_duration_min(w)
              # §5b: skip workouts under 5 minutes (abandoned/test logs)
              if dur is not None and dur < 5:
                  print(f"Skipping short workout: {w.get('name','')} ({dur} min)")
                  continue

              if start_dt and start_dt >= week_ago:
                  sessions_this_week += 1

              # Weekly volume (ISO week_start Monday)
              if start_dt:
                  week_start = (start_dt - timedelta(days=start_dt.weekday())).date().isoformat()
                  weekly_volume.setdefault(week_start, 0)

              exercise_names = []
              session_prs = []
              for ex in w.get("exercises", []):
                  ex_title = ex.get("title","")
                  exercise_names.append(ex_title)
                  muscle = next((v for k, v in MUSCLE_MAP.items() if k.lower() in ex_title.lower()), None)

                  best_this_session = 0
                  for s in ex.get("sets", []):
                      if s.get("type") == "warmup": continue
                      wt = s.get("weight_kg") or 0
                      reps_count = s.get("reps") or 0
                      if wt and reps_count:
                          e1rm = epley(wt, reps_count)
                          best_this_session = max(best_this_session, e1rm)
                          # Weekly volume
                          if start_dt:
                              weekly_volume[week_start] = weekly_volume.get(week_start, 0) + wt * reps_count

                  if best_this_session and muscle:
                      # PR detection: did this session beat the all-time best for this exercise?
                      prev_best = exercise_all_time.get(ex_title, 0)
                      if best_this_session > prev_best and prev_best > 0:
                          session_prs.append({"exercise": ex_title, "e1rm": round(best_this_session, 1), "prev": round(prev_best, 1), "date": start_str[:10]})
                      exercise_all_time[ex_title] = max(exercise_all_time.get(ex_title, 0), best_this_session)

                      # muscle_best: all-time
                      if muscle not in muscle_best or best_this_session > muscle_best[muscle]["e1rm"]:
                          muscle_best[muscle] = {"e1rm": round(best_this_session, 1), "exercise": ex_title, "date": start_str[:10]}

                      # muscle_history: only from baseline date
                      if start_dt and start_dt >= BASELINE_DATE:
                          muscle_history.setdefault(muscle, []).append({"date": start_str[:10], "e1rm": round(best_this_session, 1)})

              prs.extend(session_prs)

              if len(recent_workouts) < 5 or (start_dt and start_dt >= week_ago):
                  recent_workouts = [r for r in recent_workouts if r.get("date","") != start_str[:10] or r.get("title") != w.get("name","")]
                  recent_workouts.append({"title": w.get("name","Workout"), "date": start_str[:10], "duration_min": dur, "exercises": list(dict.fromkeys(exercise_names))})

          # Keep only last 5 recent workouts, most recent first
          recent_workouts = sorted(recent_workouts, key=lambda x: x["date"], reverse=True)[:5]

          # Deduplicate muscle_history per day (keep best per day)
          for muscle in muscle_history:
              by_date = {}
              for entry in muscle_history[muscle]:
                  d = entry["date"]
                  if d not in by_date or entry["e1rm"] > by_date[d]:
                      by_date[d] = entry["e1rm"]
              muscle_history[muscle] = sorted([{"date": d, "e1rm": v} for d, v in by_date.items()], key=lambda x: x["date"])

          # Weekly volume as sorted list
          weekly_volume_list = sorted([{"week_of": k, "volume_kg": round(v)} for k, v in weekly_volume.items()], key=lambda x: x["week_of"])

          # Only the most recent PRs (last 7 days)
          recent_prs = [p for p in prs if p["date"] >= week_ago.date().isoformat()]

          os.makedirs("data", exist_ok=True)
          with open("data/hevy.json", "w") as f:
              json.dump({
                  "updated_at": datetime.utcnow().isoformat()+"Z",
                  "sessions_this_week": sessions_this_week,
                  "muscle_best": muscle_best,
                  "muscle_history": muscle_history,
                  "exercise_history": {},
                  "weekly_volume": weekly_volume_list,
                  "recent_workouts": recent_workouts,
                  "recent_prs": recent_prs,
              }, f, indent=2)
          print(f"Hevy: {len(muscle_best)} muscle groups, {sessions_this_week} sessions this week, {len(recent_prs)} PRs")

          # ── Gym Programme commentary ──────────────────────────────────────
          print("Generating Himbo on Gym Programme commentary...")
          gym_commentary = ""
          try:
              anthropic_key = os.environ.get("ANTHROPIC_API_KEY","").strip()
              if not anthropic_key:
                  raise ValueError("ANTHROPIC_API_KEY not set")

              voice_brief = ""
              try:
                  with open("data/himbo_voice.json") as f:
                      voice_brief = json.load(f).get("voice_brief","")
              except Exception: pass

              pr_lines = [f"  New PR: {p['exercise']} — {p['e1rm']} kg e1RM (was {p['prev']} kg)" for p in recent_prs]
              top_muscles = sorted(muscle_best.items(), key=lambda x: x[1]["e1rm"], reverse=True)[:4]
              muscle_lines = [f"  {m}: {v['e1rm']} kg e1RM ({v['exercise']})" for m, v in top_muscles]
              latest_vol = weekly_volume_list[-1] if weekly_volume_list else None
              prev_vol = weekly_volume_list[-2] if len(weekly_volume_list) >= 2 else None
              vol_line = f"Weekly volume: {latest_vol['volume_kg']:,} kg" if latest_vol else ""
              if prev_vol:
                  vol_line += f" (prev week: {prev_vol['volume_kg']:,} kg)"

              gym_prompt = "\n".join(filter(None, [
                  f"Gym sessions this week: {sessions_this_week} (Scott's programme target: 4).",
                  "\n".join(pr_lines) if pr_lines else "No new PRs this week.",
                  vol_line,
                  "Top estimated 1RMs:",
                  "\n".join(muscle_lines),
                  f"Most recent workout: {recent_workouts[0]['title']} ({recent_workouts[0]['date']}, {recent_workouts[0]['duration_min']} min)" if recent_workouts else "",
              ]))

              gym_resp = requests.post(
                  "https://api.anthropic.com/v1/messages",
                  headers={"x-api-key": anthropic_key, "anthropic-version": "2023-06-01", "content-type": "application/json"},
                  json={
                      "model": "claude-sonnet-4-6",
                      "max_tokens": 400,
                      "system": (
                          (voice_brief[:1200] + "\n\n" if voice_brief else "") +
                          "Write a 3–4 sentence commentary on Matt's gym programme this week. "
                          "Cover sessions completed vs the 4-session target, any PRs, strength trend direction, and weekly volume. "
                          "Be specific to the numbers. Celebrate wins. Be honest about gaps. "
                          "Warm, mischievous, specific — tracking the becoming, not just the metrics. "
                          "No emojis. No markdown. No bullet points. Return only the finished text."
                      ),
                      "messages": [{"role": "user", "content": gym_prompt}],
                  },
                  timeout=40,
              )
              gym_resp.raise_for_status()
              text_blocks = [b["text"] for b in gym_resp.json()["content"] if b.get("type") == "text"]
              gym_commentary = "".join(text_blocks).strip()
              print(f"Gym commentary generated ({len(gym_commentary)} chars)")
          except Exception as e:
              print(f"Gym commentary error (non-fatal): {e}")

          # Append gym_commentary to existing himbo_commentary.json
          try:
              with open("data/himbo_commentary.json") as f:
                  commentary_data = json.load(f)
          except Exception:
              commentary_data = {"updated_at": datetime.utcnow().isoformat()+"Z"}
          commentary_data["gym_commentary"] = gym_commentary
          with open("data/himbo_commentary.json", "w") as f:
              json.dump(commentary_data, f, indent=2)
          print("Gym commentary written to himbo_commentary.json")
          EOF

      - name: Commit data files
        run: |
          git config user.name "Dante"
          git config user.email "dante@chorus-boys"
          git add data/strava.json data/withings.json data/himbo_voice.json data/activity_summaries.json data/himbo_trials.json data/himbo_joy.json data/himbo_sleep_ai.json data/himbo_commentary.json data/hevy.json data/himbo_checkins.json
          git diff --staged --quiet || git commit -m "chore: update himbo data [$(date -u '+%Y-%m-%d %H:%M')] UTC"
          git pull --rebase
          git push
