name: Fetch Activity Data

on:
  workflow_dispatch:
    inputs:
      csv_data:
        description: 'CSV payload from Apple Health Shortcut'
        required: true
        type: string

jobs:
  fetch-activity:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Parse and write activity data
        env:
          CSV_DATA: ${{ inputs.csv_data }}
        run: |
          python - <<'EOF'
          import json, os, re
          from datetime import datetime, timedelta

          csv_data = os.environ["CSV_DATA"]
          lines = [l for l in csv_data.strip().split('\n') if l.strip()]
          if len(lines) < 2:
              raise ValueError("CSV data is empty or missing header")

          headers = [h.strip() for h in lines[0].split(',')]
          n = len(headers)

          def split_line(line):
              parts, rest = [], line
              for _ in range(n - 1):
                  idx = rest.index(',')
                  parts.append(rest[:idx].strip())
                  rest = rest[idx+1:]
              parts.append(rest.strip())
              return parts

          MONTHS = {'Jan':1,'Feb':2,'Mar':3,'Apr':4,'May':5,'Jun':6,
                    'Jul':7,'Aug':8,'Sep':9,'Oct':10,'Nov':11,'Dec':12}

          def parse_dt(s):
              m = re.match(r'(\d+)\s+(\w+)\s+(\d{4})\s+at\s+(\d+):(\d+)\s+(am|pm)', s, re.I)
              if not m: return None
              day, mon, yr, h, mi, ampm = m.groups()
              h = int(h)
              if ampm.lower() == 'pm' and h != 12: h += 12
              if ampm.lower() == 'am' and h == 12: h = 0
              return datetime(int(yr), MONTHS[mon], int(day), h, int(mi))

          now = datetime.utcnow()
          today = now.date()

          entries = []
          for line in lines[1:]:
              vals = split_line(line)
              row = dict(zip(headers, vals))
              dt = parse_dt(row.get('date', ''))
              if dt is None: continue

              row_type = row.get('type', '').strip()
              try:
                  value = float(row.get('value', 0))
              except ValueError:
                  continue

              # VO2 Max: skip zeros
              if row_type == 'VO2 Max' and value == 0:
                  continue

              entries.append({
                  'date': row['date'],
                  'date_iso': dt.isoformat(),
                  'date_only': dt.strftime('%Y-%m-%d'),
                  'type': row_type,
                  'value': value,
                  'unit': row.get('unit', '').strip(),
                  'is_today': dt.date() == today,
              })

          os.makedirs('data', exist_ok=True)
          with open('data/activity.json', 'w') as f:
              json.dump({
                  'updated_at': now.isoformat() + 'Z',
                  'entries': entries
              }, f, indent=2)

          counts = {}
          for e in entries:
              counts[e['type']] = counts.get(e['type'], 0) + 1
          print(f"Activity: wrote {len(entries)} entries — {counts}")
          EOF

      - name: Commit data file
        run: |
          git config user.name "Dante"
          git config user.email "dante@chorus-boys"
          git add data/activity.json
          git diff --staged --quiet || git commit -m "chore: update activity data [$(date -u '+%Y-%m-%d %H:%M')] UTC"
          git push
