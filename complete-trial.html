<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complete Trial — Chorus Boys</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C9963A;
      --gold-light: #E8C96A;
      --bg: #0D0A14;
      --bg-card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --border-gold: rgba(201,150,58,0.3);
      --text-primary: rgba(255,255,255,0.92);
      --text-secondary: rgba(255,255,255,0.45);
      --text-muted: rgba(255,255,255,0.25);
      --green: #7BAE7F;
      --red: #E8458B;

      /* God colours */
      --himbo:  #E8458B;
      --hermes: #7BAE7F;
      --hestio: #C9963A;
      --eros:   #C46060;
      --apollo: #4A7ABF;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding-bottom: 4rem;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2rem;
      border-bottom: 0.5px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(13,10,20,0.92);
      backdrop-filter: blur(8px);
      z-index: 100;
    }

    .nav-brand {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.4em;
      color: var(--gold);
      text-transform: uppercase;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hero {
      padding: 3rem 2rem 2rem;
      border-bottom: 0.5px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at top left, rgba(201,150,58,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    .hero-content { position: relative; z-index: 1; max-width: 640px; }

    .hero-label {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.35em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .hero-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(28px, 5vw, 40px);
      font-weight: 900;
      color: white;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .hero-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .main { max-width: 640px; margin: 0 auto; padding: 2rem; }

    .section-title {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 0.5px;
      background: var(--border-gold);
    }

    .card {
      background: var(--bg-card);
      border: 0.5px solid var(--border-gold);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    select, input[type="date"], textarea {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 0.5px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
      -webkit-appearance: none;
    }

    select:focus, input:focus, textarea:focus { border-color: var(--border-gold); }

    select option { background: #1a1525; color: var(--text-primary); }

    select optgroup {
      font-weight: 600;
      font-style: normal;
    }

    .form-group { margin-bottom: 1.2rem; }
    .form-group:last-child { margin-bottom: 0; }

    /* Trial preview strip — shows god colour + reward on selection */
    .trial-preview {
      margin-top: 10px;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 12px;
      color: var(--text-secondary);
      display: none;
      line-height: 1.6;
      border-left: 3px solid var(--god-color, var(--gold));
      background: rgba(255,255,255,0.02);
    }

    .trial-preview .god-name {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--god-color, var(--gold));
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .trial-preview .reward {
      color: var(--text-secondary);
    }

    .trial-preview .reward strong {
      color: var(--gold-light);
    }

    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, rgba(201,150,58,0.15), rgba(201,150,58,0.08));
      border: 0.5px solid var(--border-gold);
      border-radius: 8px;
      color: var(--gold-light);
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 14px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 1rem;
    }

    .submit-btn:hover {
      background: linear-gradient(135deg, rgba(201,150,58,0.25), rgba(201,150,58,0.12));
    }

    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #status {
      padding: 14px 16px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.7;
      display: none;
    }

    #status.loading {
      display: block;
      background: rgba(255,255,255,0.03);
      border: 0.5px solid var(--border);
      color: var(--text-secondary);
    }

    #status.error {
      display: block;
      background: rgba(232,69,139,0.08);
      border: 0.5px solid rgba(232,69,139,0.25);
      color: var(--red);
    }

    /* Success screen */
    #success-screen {
      display: none;
      text-align: center;
      padding: 3rem 1rem;
    }

    .success-glyph {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 0.3em;
      color: var(--green);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .success-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(22px, 5vw, 30px);
      color: white;
      line-height: 1.3;
      margin-bottom: 0.5rem;
    }

    .success-god {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    .grace-pill {
      display: inline-block;
      padding: 4px 14px;
      border: 0.5px solid var(--border-gold);
      border-radius: 99px;
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--gold-light);
      margin-bottom: 2rem;
    }

    .success-sub {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    .another-link {
      display: inline-block;
      margin-top: 1.5rem;
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      cursor: pointer;
      background: none;
      border: none;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .another-link:hover { color: var(--text-secondary); }

    @media (max-width: 600px) {
      .nav { padding: 1rem; }
      .hero { padding: 2rem 1rem 1.5rem; }
      .main { padding: 1.5rem 1rem; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="nav-brand" aria-label="Back to Chorus Boys">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <path d="M9 2L4 7L9 12" stroke="#C9963A" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Chorus Boys
    </a>
    <div style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.15em;color:var(--gold-light);">Complete Trial</div>
  </nav>

  <div class="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <div class="hero-label">Grace &amp; Favour</div>
      <h1 class="hero-title">Complete a Trial</h1>
      <p class="hero-sub">Record what you've done. Let the gods know.</p>
    </div>
  </div>

  <main class="main">

    <!-- Form -->
    <div id="form-area">
      <div class="section-title">Trial</div>

      <div class="card">
        <div class="form-group">
          <label for="trial-select">Which Trial</label>
          <select id="trial-select" required>
            <option value="">Loading trials…</option>
          </select>
          <div class="trial-preview" id="trial-preview">
            <div class="god-name" id="preview-god"></div>
            <div class="reward" id="preview-reward"></div>
          </div>
        </div>

        <div class="form-group">
          <label for="date-input">Date Completed</label>
          <input type="date" id="date-input" required>
        </div>

        <div class="form-group">
          <label for="notes-input">Notes <span style="color:var(--text-muted);font-size:9px;">(optional)</span></label>
          <textarea id="notes-input" rows="3" placeholder="Any notes on how it went…" style="resize:vertical;"></textarea>
        </div>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="submitForm()" disabled>
        Submit Trial
      </button>

      <div id="status"></div>
    </div>

    <!-- Success -->
    <div id="success-screen">
      <div class="success-glyph">Trial complete</div>
      <div class="success-title" id="success-name"></div>
      <div class="success-god" id="success-god"></div>
      <div class="grace-pill" id="success-grace"></div>
      <div class="success-sub">The workflow is running in the background.<br>grace.json will update in about 30 seconds.</div>
      <br>
      <button class="another-link" onclick="resetForm()">Complete another trial</button>
    </div>

  </main>

  <script>
    const RELAY_URL = 'https://complete-trial-relay.matthewhyde01.workers.dev';

    const GOD_COLOURS = {
      himbo:  '#E8458B',
      hermes: '#7BAE7F',
      hestio: '#C9963A',
      eros:   '#C46060',
      apollo: '#4A7ABF',
    };

    function godColour(god) {
      return GOD_COLOURS[(god || '').toLowerCase()] || '#C9963A';
    }

    // ── Date default ──────────────────────────────────────────────────────────
    const dateInput = document.getElementById('date-input');
    dateInput.value = new Date().toLocaleDateString('en-CA');
    dateInput.max   = dateInput.value;

    // ── Load trials ───────────────────────────────────────────────────────────
    const trialSelect  = document.getElementById('trial-select');
    const trialPreview = document.getElementById('trial-preview');
    let trialsIndex = {};

    async function loadTrials() {
      try {
        const r = await fetch('data/active_trials.json');
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const data = await r.json();
        const trials = data.trials || [];

        if (trials.length === 0) {
          trialSelect.innerHTML = '<option value="">No active trials — run Grace Tally first</option>';
          updateSubmitState(); return;
        }

        // Index by ID for preview lookup
        for (const t of trials) trialsIndex[t.notion_service_id] = t;

        // Group by god
        const byGod = {};
        for (const t of trials) {
          const g = t.god || 'Unknown';
          (byGod[g] = byGod[g] || []).push(t);
        }

        let html = '<option value="">— Select a Trial —</option>';
        for (const god of Object.keys(byGod).sort()) {
          const colour = godColour(god);
          html += `<optgroup label="${god}" style="color:${colour};">`;
          for (const t of byGod[god]) {
            html += `<option value="${t.notion_service_id}">${t.service_name}</option>`;
          }
          html += '</optgroup>';
        }
        trialSelect.innerHTML = html;

      } catch (e) {
        trialSelect.innerHTML = '<option value="">Could not load trials — run Grace Tally first</option>';
        console.error('loadTrials:', e);
      }
      updateSubmitState();
    }

    trialSelect.addEventListener('change', () => {
      const t = trialsIndex[trialSelect.value];
      if (t) {
        const colour = godColour(t.god);
        trialPreview.style.display = 'block';
        trialPreview.style.setProperty('--god-color', colour);
        document.getElementById('preview-god').textContent = t.god;
        document.getElementById('preview-reward').innerHTML =
          `Grace <strong>+${t.grace_earned}</strong> &nbsp;·&nbsp; Favour <strong>+${t.favour_value}</strong>`;
      } else {
        trialPreview.style.display = 'none';
      }
      updateSubmitState();
    });

    dateInput.addEventListener('input', updateSubmitState);

    function updateSubmitState() {
      document.getElementById('submit-btn').disabled = !(trialSelect.value && dateInput.value);
    }

    // ── Submit ────────────────────────────────────────────────────────────────
    async function submitForm() {
      const trial = trialsIndex[trialSelect.value];
      if (!trial || !dateInput.value) return;

      const payload = {
        notion_service_id: trial.notion_service_id,
        service_name:      trial.service_name,
        date_completed:    dateInput.value,
        notes:             document.getElementById('notes-input').value.trim(),
      };

      const btn    = document.getElementById('submit-btn');
      const status = document.getElementById('status');
      btn.disabled = true;
      status.className = 'loading';
      status.textContent = 'Submitting…';

      try {
        const r = await fetch(RELAY_URL, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(payload),
        });

        if (!r.ok) {
          const msg = await r.text().catch(() => `HTTP ${r.status}`);
          throw new Error(msg || `HTTP ${r.status}`);
        }

        // Show success screen
        document.getElementById('form-area').style.display     = 'none';
        document.getElementById('success-screen').style.display = 'block';
        document.getElementById('success-name').textContent    = trial.service_name;
        document.getElementById('success-god').textContent     = trial.god;
        document.getElementById('success-grace').textContent   = `+${trial.grace_earned} Grace · +${trial.favour_value} Favour`;

      } catch (e) {
        status.className   = 'error';
        status.textContent = e.message || 'Something went wrong — try again.';
        btn.disabled       = false;
      }
    }

    function resetForm() {
      document.getElementById('success-screen').style.display = 'none';
      document.getElementById('form-area').style.display      = 'block';
      document.getElementById('status').className             = '';
      document.getElementById('status').style.display         = 'none';
      trialSelect.value = '';
      trialPreview.style.display = 'none';
      document.getElementById('notes-input').value = '';
      dateInput.value = new Date().toLocaleDateString('en-CA');
      updateSubmitState();
    }

    loadTrials();
    updateSubmitState();
  </script>

</body>
</html>
