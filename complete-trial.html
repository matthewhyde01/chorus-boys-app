<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complete Trial — Chorus Boys</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C9963A;
      --gold-light: #E8C96A;
      --bg: #0D0A14;
      --bg-card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --border-gold: rgba(201,150,58,0.3);
      --text-primary: rgba(255,255,255,0.92);
      --text-secondary: rgba(255,255,255,0.45);
      --text-muted: rgba(255,255,255,0.25);
      --green: #7BAE7F;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding-bottom: 4rem;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2rem;
      border-bottom: 0.5px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(13,10,20,0.92);
      backdrop-filter: blur(8px);
      z-index: 100;
    }

    .nav-brand {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.4em;
      color: var(--gold);
      text-transform: uppercase;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hero {
      padding: 3rem 2rem 2rem;
      border-bottom: 0.5px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at top left, rgba(201,150,58,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    .hero-content { position: relative; z-index: 1; max-width: 640px; }

    .hero-label {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.35em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .hero-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(28px, 5vw, 40px);
      font-weight: 900;
      color: white;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .hero-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .main { max-width: 640px; margin: 0 auto; padding: 2rem; }

    .card {
      background: var(--bg-card);
      border: 0.5px solid var(--border-gold);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    select, input[type="date"], textarea {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 0.5px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
      -webkit-appearance: none;
    }

    select:focus, input:focus, textarea:focus { border-color: var(--border-gold); }
    select option { background: #1a1525; color: var(--text-primary); }
    select optgroup { color: var(--gold); font-weight: 600; }

    .form-group { margin-bottom: 1.2rem; }
    .form-group:last-child { margin-bottom: 0; }

    .trial-preview {
      margin-top: 10px;
      padding: 10px 12px;
      background: rgba(201,150,58,0.05);
      border: 0.5px solid rgba(201,150,58,0.15);
      border-radius: 6px;
      font-size: 12px;
      color: var(--text-secondary);
      display: none;
      line-height: 1.7;
    }

    .trial-preview strong { color: var(--gold-light); font-weight: 500; }

    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, rgba(201,150,58,0.15), rgba(201,150,58,0.08));
      border: 0.5px solid var(--border-gold);
      border-radius: 8px;
      color: var(--gold-light);
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 14px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 1rem;
    }

    .submit-btn:hover { background: linear-gradient(135deg, rgba(201,150,58,0.25), rgba(201,150,58,0.12)); }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #handoff {
      display: none;
      text-align: center;
      padding: 2rem;
      background: rgba(123,174,127,0.06);
      border: 0.5px solid rgba(123,174,127,0.2);
      border-radius: 12px;
    }

    #handoff .handoff-icon {
      font-family: 'Cinzel', serif;
      font-size: 28px;
      color: var(--green);
      margin-bottom: 10px;
    }

    #handoff p {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.7;
    }

    #handoff strong { color: var(--text-primary); }

    .handoff-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    @media (max-width: 600px) {
      .nav { padding: 1rem; }
      .hero { padding: 2rem 1rem 1.5rem; }
      .main { padding: 1.5rem 1rem; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="nav-brand" aria-label="Back to Chorus Boys">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <path d="M9 2L4 7L9 12" stroke="#C9963A" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Chorus Boys
    </a>
    <div style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.15em;color:var(--gold-light);">Complete Trial</div>
  </nav>

  <div class="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <div class="hero-label">Grace &amp; Favour</div>
      <h1 class="hero-title">Complete a Trial</h1>
      <p class="hero-sub">Record what you've done. Let the gods know.</p>
    </div>
  </div>

  <main class="main">

    <div id="form-area">
      <div class="card">
        <div class="form-group">
          <label for="trial-select">Which Trial</label>
          <select id="trial-select" required>
            <option value="">Loading trials…</option>
          </select>
          <div class="trial-preview" id="trial-preview"></div>
        </div>

        <div class="form-group">
          <label for="date-input">Date Completed</label>
          <input type="date" id="date-input" required>
        </div>

        <div class="form-group">
          <label for="notes-input">Notes <span style="color:var(--text-muted);font-size:9px;">(optional)</span></label>
          <textarea id="notes-input" rows="3" placeholder="Any notes on how it went…" style="resize:vertical;"></textarea>
        </div>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="submitForm()" disabled>
        Submit Trial
      </button>
    </div>

    <div id="handoff">
      <div class="handoff-icon">✓</div>
      <p><strong id="handoff-trial"></strong><br>handed off to the Complete Trial shortcut.</p>
      <p class="handoff-sub">The workflow will run in the background and update grace.json shortly.</p>
    </div>

  </main>

  <script>
    const SHORTCUT_NAME = 'Complete Trial';

    // ── Date default ──────────────────────────────────────────────────────────
    const dateInput = document.getElementById('date-input');
    dateInput.value = new Date().toLocaleDateString('en-CA');
    dateInput.max   = dateInput.value;

    // ── Load trials from active_trials.json ───────────────────────────────────
    const trialSelect  = document.getElementById('trial-select');
    const trialPreview = document.getElementById('trial-preview');

    async function loadTrials() {
      try {
        const r = await fetch('data/active_trials.json');
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const data = await r.json();
        const trials = data.trials || [];

        if (trials.length === 0) {
          trialSelect.innerHTML = '<option value="">No active trials — run Grace Tally first</option>';
          updateSubmitState(); return;
        }

        const byGod = {};
        for (const t of trials) {
          const g = t.god || 'Unknown';
          (byGod[g] = byGod[g] || []).push(t);
        }

        let html = '<option value="">— Select a Trial —</option>';
        for (const god of Object.keys(byGod).sort()) {
          html += `<optgroup label="${god}">`;
          for (const t of byGod[god]) {
            html += `<option value="${t.notion_service_id}"
              data-name="${t.service_name.replace(/"/g, '&quot;')}"
              data-grace="${t.grace_earned}"
              data-favour="${t.favour_value}"
              data-god="${t.god}">${t.service_name}</option>`;
          }
          html += '</optgroup>';
        }
        trialSelect.innerHTML = html;
      } catch {
        trialSelect.innerHTML = '<option value="">Could not load trials — run Grace Tally first</option>';
      }
      updateSubmitState();
    }

    trialSelect.addEventListener('change', () => {
      const opt = trialSelect.options[trialSelect.selectedIndex];
      if (opt.value) {
        trialPreview.style.display = 'block';
        trialPreview.innerHTML = `<strong>${opt.dataset.god}</strong> &nbsp;·&nbsp; Grace <strong>+${opt.dataset.grace}</strong> &nbsp;·&nbsp; Favour <strong>+${opt.dataset.favour}</strong>`;
      } else {
        trialPreview.style.display = 'none';
      }
      updateSubmitState();
    });

    dateInput.addEventListener('input', updateSubmitState);

    function updateSubmitState() {
      document.getElementById('submit-btn').disabled = !(trialSelect.value && dateInput.value);
    }

    // ── Submit — open iOS Shortcut via URL scheme ─────────────────────────────
    function submitForm() {
      const opt            = trialSelect.options[trialSelect.selectedIndex];
      const notion_service_id = trialSelect.value;
      const service_name   = opt.dataset.name || opt.text;
      const date_completed = dateInput.value;
      const notes          = document.getElementById('notes-input').value.trim();

      if (!notion_service_id || !date_completed) return;

      // Pass all fields as a JSON string — Shortcut receives via input text
      const payload = JSON.stringify({ notion_service_id, service_name, date_completed, notes });
      const url = `shortcuts://run-shortcut?name=${encodeURIComponent(SHORTCUT_NAME)}&input=text&text=${encodeURIComponent(payload)}`;

      window.location.href = url;

      // Show handoff confirmation
      document.getElementById('form-area').style.display = 'none';
      document.getElementById('handoff-trial').textContent = service_name;
      document.getElementById('handoff').style.display = 'block';
    }

    loadTrials();
    updateSubmitState();
  </script>

</body>
</html>
