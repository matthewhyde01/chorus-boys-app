<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chorus Boys — The Big Gay Pantheon of Patroclus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0D0A14; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star { position: absolute; border-radius: 50%; background: white; }
    .nebula { position: fixed; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(201,150,58,0.04) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%,-50%); pointer-events: none; z-index: 0; }
    .content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; text-align: center; padding: 3rem 2rem; width: 100%; max-width: 640px; }
    .brand { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.45em; color: #C9963A; text-transform: uppercase; margin-bottom: 2rem; }
    .title { font-family: 'Cinzel', serif; font-size: clamp(32px, 8vw, 48px); font-weight: 900; color: white; line-height: 1.05; margin-bottom: 0.4rem; }
    .subtitle { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: clamp(14px, 3vw, 18px); color: rgba(255,255,255,0.45); margin-bottom: 0.5rem; }
    .divider { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, #C9963A, transparent); margin: 1.2rem auto; }
    .tagline { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 13px; color: rgba(255,255,255,0.32); line-height: 1.9; margin-bottom: 3rem; letter-spacing: 0.02em; }
    .gods { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; width: 100%; max-width: 560px; }
    @media (max-width: 480px) { .gods { grid-template-columns: repeat(3, 1fr); } }
    .god-card { border-radius: 14px; padding: 1.5rem 0.5rem 1.2rem; display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; border: 0.5px solid rgba(255,255,255,0.07); background: rgba(255,255,255,0.02); transition: all 0.35s ease; position: relative; overflow: hidden; text-decoration: none; }
    .god-glow { position: absolute; inset: 0; border-radius: 14px; opacity: 0; transition: opacity 0.35s ease; pointer-events: none; }
    .god-card.himbo .god-glow  { background: rgba(232,69,139,0.1);  box-shadow: inset 0 0 24px rgba(232,69,139,0.2); }
    .god-card.hermes .god-glow { background: rgba(123,174,127,0.1); box-shadow: inset 0 0 24px rgba(123,174,127,0.2); }
    .god-card.hestio .god-glow { background: rgba(201,150,58,0.1);  box-shadow: inset 0 0 24px rgba(201,150,58,0.2); }
    .god-card.eros .god-glow   { background: rgba(180,50,50,0.12);  box-shadow: inset 0 0 24px rgba(180,50,50,0.25); }
    .god-card.apollo .god-glow { background: rgba(74,122,191,0.1);  box-shadow: inset 0 0 24px rgba(74,122,191,0.2); }
    .god-card:hover .god-glow { opacity: 1; }
    .god-card:hover { transform: translateY(-4px); }
    .god-card.himbo:hover  { border-color: rgba(232,69,139,0.35); }
    .god-card.hermes:hover { border-color: rgba(123,174,127,0.35); }
    .god-card.hestio:hover { border-color: rgba(201,150,58,0.35); }
    .god-card.eros:hover   { border-color: rgba(180,50,50,0.35); }
    .god-card.apollo:hover { border-color: rgba(74,122,191,0.35); }
    .god-orb { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; flex-shrink: 0; }
    .god-orb.himbo  { background: rgba(232,69,139,0.15);  border: 0.5px solid rgba(232,69,139,0.4); }
    .god-orb.hermes { background: rgba(123,174,127,0.15); border: 0.5px solid rgba(123,174,127,0.4); }
    .god-orb.hestio { background: rgba(201,150,58,0.15);  border: 0.5px solid rgba(201,150,58,0.4); }
    .god-orb.eros   { background: rgba(139,26,26,0.2);    border: 0.5px solid rgba(180,50,50,0.4); }
    .god-orb.apollo { background: rgba(74,122,191,0.15);  border: 0.5px solid rgba(74,122,191,0.4); }
    .god-name { font-family: 'Cinzel', serif; font-size: 9px; font-weight: 700; letter-spacing: 0.1em; position: relative; z-index: 1; }
    .god-name.himbo  { color: #F4A0C0; }
    .god-name.hermes { color: #A8D4AB; }
    .god-name.hestio { color: #E8C96A; }
    .god-name.eros   { color: #C46060; }
    .god-name.apollo { color: #88AADD; }
    .footer { margin-top: 2.5rem; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 11px; color: rgba(255,255,255,0.18); letter-spacing: 0.05em; }
    .dante-line { margin-top: 4px; font-family: 'Cinzel', serif; font-size: 7.5px; letter-spacing: 0.35em; color: rgba(201,150,58,0.35); text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="stars" id="starfield"></div>
  <div class="nebula"></div>
  <main class="content">
    <div class="brand">Chorus Boys</div>
    <h1 class="title">The Big Gay<br>Pantheon</h1>
    <p class="subtitle">of Patroclus</p>
    <div class="divider"></div>
    <p class="tagline">Five gods. One hero.<br>Every day, a little more himself.</p>
    <nav class="gods" aria-label="Choose a god">
      <a class="god-card himbo" href="himbo.html" aria-label="Himbo — Body and Self-Expression">
        <div class="god-glow"></div>
        <div class="god-orb himbo">
          <svg width="26" height="26" viewBox="0 0 32 32" fill="none" aria-hidden="true">
            <polygon points="16,3 26,13 16,29 6,13" stroke="#E8458B" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
            <line x1="6" y1="13" x2="26" y2="13" stroke="#E8458B" stroke-width="0.8" opacity="0.4"/>
            <line x1="16" y1="3" x2="16" y2="13" stroke="#E8458B" stroke-width="0.8" opacity="0.3"/>
            <line x1="10" y1="13" x2="16" y2="29" stroke="#E8458B" stroke-width="0.8" opacity="0.2"/>
            <line x1="22" y1="13" x2="16" y2="29" stroke="#E8458B" stroke-width="0.8" opacity="0.2"/>
            <polygon points="16,7 22,13 16,24 10,13" fill="#E8458B" opacity="0.08"/>
          </svg>
        </div>
        <span class="god-name himbo">Himbo</span>
      </a>
      <a class="god-card hermes" href="hermes.html" aria-label="Hermes — Soul and Flow">
        <div class="god-glow"></div>
        <div class="god-orb hermes">
          <svg width="24" height="24" viewBox="0 0 30 30" fill="none" aria-hidden="true">
            <path d="M15 25 C15 25 8 18 8 11 C8 7 11 5 15 5" stroke="#7BAE7F" stroke-width="1.4" stroke-linecap="round" fill="none"/>
            <path d="M15 5 C19 5 22 7 22 11 C22 18 15 25 15 25" stroke="#7BAE7F" stroke-width="1.4" stroke-linecap="round" fill="none"/>
            <path d="M15 25 L15 5" stroke="#7BAE7F" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.4"/>
            <path d="M15 20 C13 18 10 16 9 14" stroke="#7BAE7F" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.4"/>
            <path d="M15 17 C13 15 10 13 9 11" stroke="#7BAE7F" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.4"/>
            <path d="M15 14 C13 12 11 10 10 9" stroke="#7BAE7F" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.4"/>
            <path d="M15 20 C17 18 20 16 21 14" stroke="#7BAE7F" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.3"/>
            <path d="M15 17 C17 15 20 13 21 11" stroke="#7BAE7F" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.3"/>
          </svg>
        </div>
        <span class="god-name hermes">Hermes</span>
      </a>
      <a class="god-card hestio" href="hestio.html" aria-label="Hestio — Hearth and Connection">
        <div class="god-glow"></div>
        <div class="god-orb hestio">
          <svg width="24" height="24" viewBox="0 0 30 30" fill="none" aria-hidden="true">
            <path d="M8 20 C8 16 10 14 15 14 C20 14 22 16 22 20" stroke="#C9963A" stroke-width="1.4" stroke-linecap="round" fill="none"/>
            <path d="M7 22 C7 22 10 20 15 20 C20 20 23 22 23 22" stroke="#C9963A" stroke-width="1.4" stroke-linecap="round" fill="none"/>
            <path d="M9 21 C11 19 13 20 15 19 C17 20 19 19 21 21" stroke="#C9963A" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.4"/>
            <ellipse cx="12.5" cy="17" rx="2" ry="1.5" fill="#C9963A" opacity="0.5"/>
            <ellipse cx="17.5" cy="17" rx="2" ry="1.5" fill="#C9963A" opacity="0.5"/>
            <ellipse cx="15" cy="16" rx="2" ry="1.5" fill="#C9963A" opacity="0.7"/>
          </svg>
        </div>
        <span class="god-name hestio">Hestio</span>
      </a>
      <a class="god-card eros" href="eros.html" aria-label="Eros — Desire and Expression">
        <div class="god-glow"></div>
        <div class="god-orb eros">
          <svg width="24" height="24" viewBox="0 0 30 30" fill="none" aria-hidden="true">
            <rect x="9" y="15" width="12" height="10" rx="2" stroke="#C46060" stroke-width="1.4" fill="none"/>
            <path d="M11 15 L11 11 C11 8.2 19 8.2 19 11 L19 15" stroke="#C46060" stroke-width="1.4" stroke-linecap="round" fill="none"/>
            <circle cx="15" cy="20" r="1.5" fill="#C46060" opacity="0.7"/>
            <path d="M15 21.5 L15 23" stroke="#C46060" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="god-name eros">Eros</span>
      </a>
      <a class="god-card apollo" href="apollo.html" aria-label="Apollo — Mind and Mastery">
        <div class="god-glow"></div>
        <div class="god-orb apollo">
          <svg width="24" height="24" viewBox="0 0 30 30" fill="none" aria-hidden="true">
            <circle cx="15" cy="15" r="9" stroke="#4A7ABF" stroke-width="1.5" fill="none"/>
            <circle cx="15" cy="15" r="3" fill="#4A7ABF" opacity="0.6"/>
            <circle cx="15" cy="15" r="1.5" fill="#88AADD"/>
          </svg>
        </div>
        <span class="god-name apollo">Apollo</span>
      </a>
    </nav>
    <p class="footer">Guided by Dante · Held by the map</p>
    <p class="dante-line">compass true</p>
  </main>
  <script>
    const sf = document.getElementById('starfield');
    for (let i = 0; i < 120; i++) {
      const s = document.createElement('div'); s.className = 'star';
      const size = (Math.random() * 1.8 + 0.4).toFixed(1);
      s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${size}px;height:${size}px;opacity:${(Math.random()*0.45+0.05).toFixed(2)};`;
      sf.appendChild(s);
    }
  </script>
</body>
</html>
